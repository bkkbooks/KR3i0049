body:
  text: 異魚圖贊箋䟦予作異魚圖贊間出以示好事者或獻疑曰爾雅注蟲魚定非磊落人子不見韓子之詩乎予曰韓子有為言之也跡其焚膏繼晷之際口吟手披之餘遇蟲名魚字將刪之乎老子云美言不信而五千之言未嘗不美莊子欲絶學而莊子何嘗不學蘓子謂人生識字憂患始其欲人盡不識字乎如此之類古人善戲謔自掊擊之一機也􅢖然不可以訓若孔子則豈其然敎小子以學詩終於多識則蟲魚固在其中矣孔子豈非磊落人哉近之不悦學者􅉨􅉨拾古人善謔之言以為不肖護躬之符可笑且悼充類其說則伏獵弄麞之侍即長鎗大劒之將軍一一皆磊落人也夫升菴載識
