body:
  text: 異魚圖賛箋譜録類三草木禽魚之屬提要臣等謹案異魚圖賛箋四卷國朝胡世安撰初楊慎作異魚圖賛間有自註僅標所據書名未暇備引其説世安既為之補又於崇禎庚午博採傳記以為之箋徴引頗極繁冨其名實舛互者於目録之中各為駁正亦殊有辨證惟貪多嗜博挂漏轉多或賛中所引而失註如赤鯉條下霧光憤世之類或自註明云據某書者而亦失註如魴鯉條下河雒記引諺之類而前代故實絶無闗於名義者乃支離曼衍累牘不休是徴事之書非復訓詁之體然其捜採典籍實為博贍故殊形詭状一一皆有以考辨其源流雖不免糅雜之譏要亦未始非識小之一助也乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀異魚圖贊箋叙客嘗執是編而問曰用脩豈有託乎始鯤終鯨志辨化信也志京觀義也附始膏以自焚之鼂志懲賄智也終離以著象之蠯志式度禮也余曰唯唯否否試類廣之東方蒼龍之宿蟲之鱗者屬焉春令蟲鱗而大人之占曰衆維魚矣實維豐年豈非天地仁厚之氣先於在淵見端哉聖人作則畜四靈先厪淰鮪失情之慮甚深逺矣其見於易貫以率類包不及賔信著中孚物性應感未可盡誣也序詩者曰天保以上治内采薇以下治外始於憂勤終於逸樂於是萬物盛多能傋禮可告功神明而魚麗詠焉至魚在在藻則慶遂性而徳至淵泉三星在罶則傷無魚而百物雕耗魚無當於盛衰而盛衰之兆繇之奚翅感陽而陟食清而㳺符于君子出處之道足以引情濠梁上哉贊圖者偶也箋補贊者亦偶也嗣閲箋而有感未必非偶也是編亦可以興乎崇禎庚午仲春望秀巖隠史胡世安書欽定四庫全書異魚圖贊箋目録明楊慎原本巻一大學士胡世安箋總贊鯤一作按爾雅郭注凡魚之子總名鯤邢疏詩其魚魴鰥鄭云鰥魚子鯤鰥葢古字通用也魯語里革曰魚禁鯤鮞亦以鯤為魚子也張楫廣雅䱋居冢切鯤也魴鯉爾雅埤雅爾雅翼本草諸書皆以魴一名魾音比今之鯿也惟說文分釋魴赤尾魚或从旁作鰟而趙宧光箋之曰詩魴魚赬尾傳者以鯿訓大小殊絶互詳鯿箋魴形濶而短故从方魴體薄弱止必相傍或傍厓石漁人設房水中以羑取之故重文从旁按爾雅另標魾音皮大鱯小者鮡則魾似有二李時珍云鯉鱗有十字文理故名赤鯉嘉魚或名丙穴魚蒲魚八魚異性色鱮鮒鮒古作即今鯽字諸本皆如此惟說文趙箋云方言稱土鮒此魚坿土而浮一説即􅠧鯽同非是鱮詩傳訓鰱按鰱有黄白二種池畜之肥者黄者頭大俗呼滂鰱滂者鰟之譌也鱮色白北土皆呼白鱮諸說皆云即鱅或云即鰫惟時珍以鱅另種詳箋又鰫有黑鰱之說一名皁鰱鱒一名赤眼魚鯽魚說文作􅠧以其背隆起如劍脊故從脊互見鮒釋又一種䲙魚似鯽而味殊功異鮆魚說文飲而不食刀魚也趙箋江南在在有之海出者佳而孕子江出大而不孕湖出有大小二種並味薄不珍一名鱭魚一名鮤魚一名鱴魛一名魛魚一名鰽音遒亦作鮂魚一名望魚按贊止標山海經而未及其狀也又爾雅鮂黒鰦鱸魚松人名四腮魚鱏鰉釋名鱏一名鱘魚一名王鮪一名碧魚今遼東名竒里瑪亦通作䲋或作淫傳曰伯牙鼔琴淫魚出聽是也鰉一作鱑釋名鱣魚一名黄魚一名蠟魚一名玊版魚異物志含光魚按二魚相屬而殊産不得混作一物洄魚一名鱯魚爾雅郭注似鮎而大白色邢疏大者别名魾小者别名鮡也陶宏景云鱯似鯷而大鮠似鯷而色黄韓保昇云口腹俱大者名鱯背青口小者名鮎背黄腹白者名鮠二說豈盡耳食而時珍又别據以俱駁之按說文鱧訓鱯􅫛訓鱧時魚一作鰣說文長箋引吕覽東海之鮞云或作鰣鮧魚一作鯷一名鰋一名鮎說文訓大鮎鯷鱟音后魚䱟鯺郎君子鮝按此當入海錯不應附此䲛此鰽字之誤亦當附鮆鱷二贊鰐􅾒仝􅀈䰽二贊音敷沛本草海豚魚一名海豬生江中者名江豚或名江豬或名水豬一名鱀魚一名饞魚魚舅一名當互弓魚􅺘魚疑鱊兒魚卷二鯪魚一名鯪鯉一名龍鯉一名石鯪魚一名穿山甲爾雅翼又名鯪豸以居土穴葢獸之類非魚屬也特其鱗色相若耳天問鯪魚何所栁對鱗魚人貌邇列姑射栁徑以鯪作陵魚矣釋引山海經所謂西海中近列姑射山有陵魚人面人手魚身見則風濤起者耳非此物勁䱜按本草䱜即鮫魚今標勁䱜豈南越另有此一種耶但洞腹養子之說則一也其字鵲錯二音石首魚嶺表録名石頭魚拾遺録名鮸魚浙志名江魚臨海志名黄花魚或以鯼即此魚而本草分標别有一種鰲魚亦同冐鮸名者非一類又石首亦有黄魚之稱石首化鳬比目魚一名鰈一名鰜一名魪一名魼一名鞋底魚一名婢簁一名奴屩一名版魚一名箬葉魚王餘諸說以即比目單片雖相沿已乆不如爾雅翼本草綱目分標較覈鰕魚山海經名人魚爾雅一名魵蜀人名魶音納秦人名鰨音塔與比目音蝶異拾遺名鯢魚與海中鯨雌同名異物鰼鰼魚鰌亦鰼名文魮二贊一名鴽鮆飛魚文鰩亦有此名王鮪即鱏詳前并箋丹魚䱤魚望魚詳鮆釋鮫二贊一名沙魚同鯊一名䱜魚一名鰒魚與石決明同名而異物一名溜魚尚有多名詳箋或曰本名駁音駮訛作鮫按䱜鮫沙魚諸說多通系之龍魚二贊一名龍鯉又混鮫名烏魚即鱧說文訓鱯也一名蠡魚一名黒鱧一名𤣥鱧一名烏鱧一名鮦魚邢疏即今䱰也一名文魚又名鰹俗呼火柴頭魚蘇頌圖經引毛詩注謂鱧即鯇誤矣瓊魚石桂魚即鱖魚一名罽魚一名水豚又有鮰稱又小魚亦有鱖名見王餘與鮬箋横公魚一作黄公魚卷三髮魚琵琶魚含光魚即鱣詳鰉釋并箋􅬻魚䱼之譌婢屣奴屩即比目魚石班魚戴星魚䱽魚即鯧魚䱥魚文字集畧亦作鰶祭制二音又鮆亦冒䱥名鰥魚見䱤箋何羅魚鰅魚鮯魚山海經名鮯鮯古沓切䱡魵鱸􅵨鱳按說文鱸􅵨當是䲐之譌䱡居六切魵符分切訓出薉邪頭國頭䲐即古切鯄博葢切鱳盧各切鮞互見鰣釋鰸烏鰂三贊一作烏賊一作烏則一名墨魚一名纜魚鹽乾者名明鮝淡乾者名脯鮝鰻鱺一名白鱓一名蛇魚乾者名風鰻又一種海鰻鱺亦名慈鰻鱺亦名狗魚原二字合呼一說粉色者鰻蒼無粉者鱺青魚亦作鯖魚書云即草魚之青者􅪓此字說文訓蚌也兵永切贊引石鼓文當作與鯾鯿同舊皆訓即魴惟趙箋云鯾魴形似體薄而廣鯾大者五六斤魴不盈銖兩雄魴鱗有五色鯾惟縹白而已詩傳以鯾訓魴方猶鰱鱮之誤大抵物非親炙即母曼訓竹頭䱢魚鮬音步說文即鯜本草即䲙䱀即黄顙魚古名黄鱨魚詩注名黄頰魚與鱤同此名食療作黄頼魚亦無鱗不益人一名䱀􅀈一名䱀䰲顙頰以形鱨以味央軋以聲也今人析而呼黄䱀黄䰲或以陸機作黄揚訛按詩古文魚麗于罶揚鯊說文訓鱨揚也說苑投綸錯餌迎而吸之者陽橋也則揚之呼亦古矣沙魚爾雅作鯊一名鮀郭注今吹沙小魚一名沙溝魚一名沙鰛音問一名阿浪魚鱓魚異苑作黄䱇蘆䱐􅷀魚鱀即䱐䰽海鰌詳爾雅翼埤雅小者名泥鰌一名鰼鯨三贊古作䲔或作􅀈卷四􅡷􅠦􅔢鼊一作蚼􅨐本草綱目即蠵龜一名嘴􅀈音兹夷一名靈蠵一名靈龜一名屓屭音戲備雜俎作係臂者非或云大者為蟕蠵屓屭小者􅔢鼊甚通海月本草拾遺另標綱目釋名即作江珧海鏡二贊又名鏡魚陵龍山蠵互詳􅔢鼊釋按諸説則秦龜是山龜蟕蠵是澤龜與水蠵海蛤李時珍云海蛤者諸蛤爛殻之總稱不尃指一蛤也舊本一名魁蛤則又指是一物矣允宜正之不得以萬贊拘也江瑶柱二贊本草以即海月紫紶一名紫虈音枵餘名見箋石決明贊即作鰒李時珍云陶作紫貝雷氏具真珠牡楊倞注荀作龜脚皆非惟鰒是一種二類故功用相同詳本草殻名千里光東海夫人菜名淡以味殻以形夫人以似也海牛詩義疏名魚貍魚之大而有力者又􅀈亦有力魚大蟹彭螖沙狗擁劒招潮倚望石蜠蜂江蘆虎車螯蠣房蚶子蚶亦作魽一名魁蛤一名伏老餘名詳箋廣人又謂之蜜丁名醫别録作活東誤活東蝌蚪也見爾雅箋附二贊貝一名貝齒一名白貝一名海􅚔别有紫貝又文貝又名砑螺者珂名馬軻螺又名珬音恤者徐衷作馬珂通典云老鵰入海為珬即軻也皆貝類本草分列之箋附二贊蚌原一贊今補郭贊列前螺又拾遺海蠃圖經名流螺交州記名假豬螺厴音掩名甲香蜃按雉化者是車螯之蜃氣成樓臺者是蛟類之蜃如贊徑作一物矣蠯品脾排三音一名馬刀一名馬蛤一名齊蛤一名蜌一名蝏䗒音亭品一名單音善母一名􅯢音掣岸異魚圖贊箋目録
