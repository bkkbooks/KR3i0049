body:
  text: 異魚圖贊箋卷一明楊慎原本大學士胡世安箋總贊魚之為字燕尾相似水蟲之中實繁厥類鱗鬛風濤抑龍之次百種千名研桑莫記圖贊所取亦祗以異鱗物說文水蟲也象形魚尾與燕相似故作四㸃非火非炙魚部凡一百有三始䱵終鯜淮南子鱗蟲三百六十而神龍為之長又云介鱗生蛟龍蛟龍生鯤鯤生鯁鯁生建邪建邪生庶魚凡鱗者生于庶魚介墰生龍先龍先生𤣥黿𤣥黿生靈龜靈龜生庶龜凡介者生于庶龜注介鱗鱗之先介墰介之先也按段成式以龜為魭此盖龜魚之始也符子觀于龍門有魚奮鱗鼔鬐登乎龍門而為龍以實應也神農書龍八十一鱗具九九之數鯉三十六鱗具六六之數乾坤之用也鯉為魚王故爾雅釋魚以冠篇鯤鯤本魚子細如蠶茸莊周寓言鯤化為鵬譬彼詩頌雕育桃蟲千古言詮誰發其䝉莊子北溟有魚其名為鯤鯤之大不知其幾千里此寓言也按内則卵醬卵音鯤國語魚禁鯤鮞皆以鯤為魚子至小之物莊子乃以至小為至大便是滑稽之開端後人不得其意晉江逌詩巨鼇戴蓬萊大鯤運天池倐忽雲雨興俯仰三洲移孫放詩巨細同工焉物化無常歸脩鯤解長鱗鵬起扇雲飛撫翼摶積風仰凌垂大翬皆不得其言詮也雖郭象之𤣥奥沉思亦誤况司馬彪輩乎後世禪宗衲子却得其意故有龜毛兔角石女懐胎一口吸盡西江水新羅日午打三更之偈亦可信以為實事耶余嘗謂天地乃一大戯塲典籍乃古今大劇本千載而下不得其解皆矮人觀塲也元儒南充范無隠有是説而余推衍之升菴原注載按字書亦巨魚魚子並注應兩存之魴鯉伊雒魴鯉天下最美伊雒鯉魴貴于牛羊雒口黄魚天下不如河雒記引諺里語雒鯉伊魴貴于牛羊言雒水渾深宜鯉伊水清淺宜魴也又曰居就糧梁水魴今遼東梁水之魴特肥而厚汝墳註魴身廣而薄少力細鱗尾白廣州記廣而肥甜魚之美者也埤雅云魴一名魾今之青鯿細鱗縮項濶腹魚之美者然弱魚也其廣方其厚褊故一曰魴一曰鯿爾雅翼説苑陽晝曰夫投綸錯餌迎而吸之者陽鱎也其為魚也薄而不美若亡若存若食若不食者魴也其為魚也博而味厚今網罟者乃以魴易取豈難于釣而易于網耶詩稱魴魚赬尾説者以魚勞則尾赤左傳如魚竀尾衡流而方羊裔焉鄭氏以魚肥則尾赤二説雖不同然魚肥則不耐勞不耐勞則易赤以魴言之其體博大而肥不能運其尾加之以衡流則其勞甚矣宜其尾之赬也林日瑞漁書海魴身扁而博縮頭穹脊兩傍似翼上青而腹白有尾長似牛尾肉無細骨尾中有刺捕者多為所蟄尚有黄魴黒魴燕魴味佳而無尾錦魴皮有硬珠似沙皮可以飾劍又一種名金絲魴出自閩福寧肉有絲如金色味甚佳毛詩所云皆河産也與海産不倫神農書鯉最為魚之主今人以盤水養之雖困鱗不反白盖徤魚也續博物志鯉魚大小􅆃並三十六鱗雜俎亦云􅆃鱗一道每鱗有小黑㸃大者皆三十六鱗古語云五尺之鯉與一寸之鯉大小雖殊而鱗之數等是也述異記鯉魚滿三百六十蛟龍輒率而飛去一年置一神守之則不去矣神龜也陶朱公曰以六畆地為池池中有九洲則周遶無窮自謂江湖也求懐子鯉魚三赤尺仝者二十頭牡鯉魚三赤者四頭以二月上庚日内納仝池中令水無聲魚必佳一作生所以養鯉者鯉不相食易長也至四月内一神守六月内二神守八月内三神守神守者鼈也内之則魚不飛去至來年二月可得一赤者一萬五千二赤者四萬五千三赤者萬枚直五千可得榆莢一年二十五萬又明年一赤者十萬二赤者五萬三赤者五萬四赤者四萬畱二赤者二千為種餘可得榆莢五百十五萬候至來年不可勝計也九洲八谷谷上立水二赤谷中立水六赤宋費樞釣磯立談云鯉一名穉龍赤鯉霧光憤世自投盧川盧川水伯赤鯉送旃易名琴髙化形而仙至今揚光清泠之淵事見符子及吳地記畫圖有水仙乘赤鯉者即其人按列仙傳及一統志琴髙趙人一云涇縣為宋康王舍人善鼓琴行彭涓之術浮㳺冀涿間二百餘年後入碭水中取龍子與諸弟子期曰當潔齋待我於水傍果乗赤鯉來坐畱一月復入水去魏都賦琴髙入水而不濡時乘赤鯉而周旋陶𢎞景云鯉為諸魚之長形既可愛又能神變乃至飛越江湖所以仙人琴髙乘之也崔豹云交州人呼赤鯉為𤣥駒白鯉為白驥黄鯉為黄騅雜俎唐律鯉號赤鯶公博異記王昌齡誤投金錯刀水中忽有赤鯉入舟剖腹得刀又述異記江隂北有子英廟子英即野人也善入水捕魚得一赤鯉將着家池中養之後長徑一丈有角翅謂子英曰我迎汝身汝上我背遂升於天為神仙晉時人一種通身紅如金曰金鯉一種尾如鳬或三岐或兩岐曰金鳬魚宋髙宗養之池中寘水銀其下者也時金元昌而翫以為樂悖矣嘉魚南有嘉魚出于丙穴黄河鮇魚佳味相頡最宜為脡鬲以蕉葉不爾脂腴將滴火滅詩南有嘉魚烝然罩罩雜見水經蜀都賦任豫益州記樊綽雲南記博物志丙穴穴向丙也餘東序録謂丙日嘉魚出穴河陽稱鮇魚言味美也按蜀志成都諸縣皆有細鱗似鱒俗謂拙魚言性鈍也夔府達州東北明通廢縣井峽中凡十穴皆産嘉魚春社前即出穴秋社即歸其出也止于巴渠龍􅆃灘首有黑㸃謂照映星象相感而成長身細鱗肉白如玉其味自鹹盖食鹻泉也他如開縣石門山盤頭洞梁山縣栢枝山下雅州城南皆産皆丙穴又沔縣大景山與小景山相連有穴方圓三丈餘其口向丙有水潛流二三月有魚長八九寸從穴中出公孫述傳蜀有魚鹽兩穴利注漢中二魚穴常以三月取之穴口向丙食乳水味美食之令人肥健悦澤故名埤雅嘉魚鯉質鱒鱗肌肉甚美食乳泉出丙穴鮇魚出黄河口東山經諸鉤山廣圓百里多寐魚按寐即鮇音味嘉魚類也范成大桂海虞衡志嘉魚狀如小鰣魚多脂味極腴美出梧州大山人作鮓餉逺劉恂嶺表録異蒼梧戎縣江水日出嘉魚肥美衆魚所莫及每炙食以芭蕉隔火恐脂滴火滅也又可作脡潯州貴縣西有嘉魚井泉通江中中有嘉魚臨水觀之厯厯可數録異記嘉魚䱓魚也形如鱒人以芭蕉隔火炙之肥美莫及宋祁方物贊云南有丙穴厥産嘉魚鯉質鱒鱗為味珍腴蒲魚蜀有蒲魚其形如粥出于郫縣蒲村之麓魏武帝四時食制或曰􅥸魚今廣州亦曰蒲魚杜詩魚知丙穴繇來美酒憶郫筒不用沽注引沔南丙穴沔去郫千里不應逺取盖即此魚也其魚亦出於穴韓詩蒲魚尾如蛇口眼不相營八魚異性色鰋偃鯉俯鱧圓魴方䱾青鯶赤鰻白鱨黄陸佃說文鰋大鮎本作鮧亦作鮷偃額兩目上陳額大尾小身滑無鱗一云白額魚性好偃或云匽訓匿鮎善自藏以避網罟故從匽魚麗註鰱也鯉赤鱗浮泳水中首俛于尾或作䱝鯟按篇海䱝牌皮二音黑鯉鯟音東似鯉鱧鮦也爾雅翼鱧魚圓長斑㸃有七作北斗象夜則仰首向北拱之即今黑鱺魴縮項穹脊細鱗博腹其味腴其色青白以體方故名䱾大青魚詳後青魚箋鯶似鱒而大色赤一曰惟鯶魚良其口濶而盆首似鯉而身圓食草而易長謂之草魚爾雅翼作鯇按本草鯇音患魚一名鰀音緩魚一名草魚郭璞作鯶其性舒緩故有鰀名因食草又有草名李時珍云形長身圓肉厚而鬆狀類青魚又有青鯇白鯇二種白者味勝商人多䱒之鰻似鱔無鱗甲腹下白背青色有雄無雌以影漫鱧而生子故名亦作廣韻鰻􅢵鰻鯠一物耳詩注鱨鯣也今黄頰魚似燕頭魚身形厚而長大頰骨正黄魚之大而有力解飛者釋名黄顙魚續博物志食黄顙魚後飲荆芥湯必死一名揚合黄舊説此魚膽春夏近下秋冬近上鱮鮒清撿出佳鱮濁撿出好鮒美珍于常味取以二月初水經注一統志沔縣度水有二源曰清撿濁撿在今陽平關清水出鱮魚濁水出鮒魚味皆美常以二八月取之李時珍云酒之美者曰􅀈魚之美者曰鱮陸佃云好羣行相與也故名鱮相連也故名鰱傳云魚屬連行是已博雅鱃魚名鮒鱮按南山經旄山蒼體之水出焉西注于展水中多鱃魚注今鰕鰌其狀如鯉而大首食者不疣又欽山師水出焉太山鉤水出焉北注勞水中皆多鱃鮒洞庭之鮒出于江渂即岷或作汶宏一作紅腴青顱朱尾碧鱗劉邵七華節文鮒一名􅀈吕子曰魚之美者洞庭之鮒其魚肉厚味美性不食釣本草云即鯽色黑而體促腹大而脊隆所在池沼皆有之埤雅此魚旅行吹沫如星以相即曰鯽以相附曰鮒易井谷射鮒少牢饋食曰魚用鮒十有五而俎月十五日而盈也蓋美鮒也神異經東南海中有温湖鮒魚生焉食之宜暑而避風寒養魚經有土附之魚似黑鯉而短小附土而行不似他魚浮水故名京口録首大而身小謂之吐􅽸雨航雜録吐哺魚名土附以其附土而行也或曰食物嚼而吐之故名未審一種否鱮緡調餌芳可獲鱮魚網魚得鱮不如噉茹或名曰鱅其性慵如説苑子賤語又古諺埤雅鱮性亦旅行故制字從與釋名亦稱鰱失水即死弱魚也亦作魣敝笱註謂似魴厚而頭大李時珍云狀似鱅而頭小形扁細鱗肥腹其色最白故西征賦云華魴躍鱗素鱮揚鬐六韜緡隆餌重則嘉魚食之緡調餌芳則庸魚食之庸魚鱅也似鱒而黑大首性慵弱不健魚之不美者故有不如啖茹之諺一説鯇食草鱮食鯇矢故以為不美然詩稱孔樂韓土川澤訏訏魴鱮甫甫則昔人美之矣說文鱅本作鰫一名鱮幽州曰胡鱅按本草鱅一名鱃魚中之下品盖庸常以供羞食者故名鄭𤣥作溶魚李時珍云狀似鰱而色黑其頭最大有至四五十斤味亞于鰱鰱之美在腹鱅之美在頭或以鰱鱅一物誤矣首之大小色之黑白大不相侔又按釋名鰫魚似牛音如豕目旁有骨食之鯁人不可出曰乙惟東海鰫魚有之非爾雅魚腸曰乙也據二説則鱅鰫俱非鱮豈有另種同名者耶鱒鞏雒之鱒割以為􅀈分芒析縷細亂蠻足張平子七問節文爾雅鮅鱒注赤目魚似鯶而小多獨行故从尊此魚處處有之赤脉貫瞳身圓而長鱗細于鯶青質赤章好食螺蚌善于遁網者是矣養魚經有難長之秧曰猛艘其首黄色曰螺師青以其食螺師也故名爾雅翼鱒魚食螺蚌是也其口尖期年而鼻竅始通不得通則死長至尺許乃易大詩九罭之魚鱒魴盖鱒員魴方君子道以員内義以方外周公之徳具焉故詩以取喻鯽魚滇池鯽魚冬月可薦中含腴白號水母線北客乍餐以為麵纜樊綽甫夷志蒙舎地有鯽魚大者重五斤西洱河及滇池冬月多鯽魚孟詵云鯽魚平胃氣調中益五藏和蓴作羮食良又鯽魚狀頗同味則有殊䲙是櫛化鯽是稷米所化其魚腹上猶有米色寬大者是鯽背髙腹狹小者䲙功稍不及鯽按米化之說恐不盡然李時珍云鯽喜猥泥不食雜物故能補胃冬月肉厚子多其味尤美丹溪云諸魚屬火獨鯽魚屬土有調胃實腸之功但多食亦能動火神異經潯陽青林湖鯽大者二尺餘小者滿尺食之肥美可止寒熱又東南海内祖洲上有恒湖鯽長八尺食之宜暑而避風志安福蜜湖産鯽味甘如蜜奉化出青鯽佳石門青陽渾出石鯽魚又有重唇魚雙鱗魚皆鯽類竒品也又滁州成濠出風鯽甚巨范蠡種魚經以竹刀剖活鯽入水銀少許同水滓油菜裹之和拌納魚腹中再以菜裹魚縣空處四十九日取河水一盆用魚腹中子一二粒置中以物盖之少時一粒即成一魚鮆魚浮玉之山北望具區苕水出焉中多鮆魚胡蝶所化鮤鱴長須山海經浮玉山北望具區苕水出于其隂中多鮆魚又汾水多魮魚狀如鯈而赤鱗其音如叱食之不驕尾有毒按汾産似另種爾雅鮤鱴刀注鮆魚蘇子瞻知有江南風物否桃花流水鮆魚肥注狹薄長鬚太湖中饒黄省曾養魚經鮆狹薄而首大長者盈尺俗呼刀鱭初春出于湖馮元成雨航雜録鮆刀魚一名魮與石首魚皆以三月八日出文選所謂鯼魮順時而往還是也子多而肥腹皆似刀夏初曝乾可以致逺又名䱥李時珍云即鱭生江湖中三月始出狀如削木片亦如長薄尖刀形細鱗白色吻上有二硬須腮下有長鬛如麥芒腹下有硬角刺快利若刀腹後近尾有短鬛肉中多細刺煎炙或作鮓鱐皆美烹煮不如淮南子鮆魚飲而不食鱣鮪食而不飲嶺表録異嘗有人浮南海泊于孤岸忽有一物如蒲帆飛過海將近舟舟人競以物擊之如帆者盡碎墜舟上視之乃蛺蝶也去其翅足秤之得肉八十斤啖之肥美如魚盖此蝶將入水化魚也胡蝶化魚此一證鱸魚鱸魚肉白如雪不腥東南佳味四腮獨稱金虀玉膾擅美寧馨吳都鱸魚膾八九月霜下時收鱸三尺以下劈作鱠浸洗布包瀝水乾置盤内取香柔花葉相間切葱和鱠拌令匀霜鱠肉白如雪且不腥名金虀玉鱠松江志華亭谷有水縈繞百餘里乃長泖之異名出鱸魚按鱸出松江者獨四腮隋煬帝謂金虀玉膾東南佳味亦見拾遺記養魚經鱸魚四腮巨口而細鱗非江海之産則三腮金谷園記秋中繇海而入江可以作鱠京口録有二種曰脆鱸曰爛鱸閩志鱸身有黑文按黑色曰盧此魚白質黑章故名李時珍云出以四五月長僅數寸狀似鱖鱏鰉鱏鰉逆流不過鎻江在叙州灘崩秭歸癸卯年事又隔巫陽魚官空設玉板不嘗鱏鱘䲋仝養魚經江海之産有鱘鰉之魚其長丈餘鼻端有肉骨四分身之一兩頰之肉謂之鹿頭可以為鮓京口録云是兩種鱘肉色白鰉肉色黄廣州謂之鱘龍之魚云類龍而無角按釋名鱏王鮪也碩人註鱣魚似龍黄色鋭頭口在頷下背上腹下皆有甲大者千餘斤鮪似鱣而小黑青色陳藏器云鱘魚味甘平無毒主益氣補虛令人肥健生江中背如龍長一二丈鼻上肉作脯名鹿頭一名鹿肉補虛下氣子如小豆食之肥美殺腹内小蟲續博物志鱣無鱗長鼻軟骨俗謂玉板江東呼黄魚南越志䲋屬長數丈而骨可啖似黄䱦而長其魚大如五斗奩每三月中從河上于孟津捕之黄肥堪作鮓黄衷海語鰉有二種常鰉類鰣魚而小河海皆産也海鰉身首差短嵗二八月羣至數百騰于沙嶼移時化為鳥俗呼火鳩是也海濵居民候其上也譟而驚之化者纔十五鱗鬛全不開者不全化矣居人羞者市者瀕海皆足按鱣釋名黄魚大者曰王鱣一名蠟魚一名玉板魚詳後鰉魚含光二箋洄魚河豚藥人時魚多骨兼此二美而無兩毒粉紅雪白洄魚堪録西施乳㴙水羊胛熟釋名鮠即鮰李時珍云鮠生江淮間無鱗甲亦鱘屬也頭尾身鬐俱似鱘狀惟鼻短爾口目亦在頷下骨不柔脆腹似鮎魚背有肉鬐尾有岐北人呼鱯南人呼鮠並與鮰音相近今通稱鮰而鱯鮠之名不彰矣其名􅫛者鱯音之轉秦人謂其發癩又稱䲚魚漁書一云鮠魚生海中大如石首不腥作膾如雪隋吳都進鮠魚膾取快日曝乾瓶盛臨時以布裹水浸用與祁膾無異補筆談一卷内載河豚􅥸鮠回規之辨甚詳海語云河豚出于江湖者皆不盈尺海中大者如豕腹雜紅黄文采可玩常魚率順水而逰此則旋迴戯躍噴沫之聲烏烏如訓狐舶人聞其聲知其下有河豚也以小絙繫义鏢擲而獲之有重數十斤者李時珍云河豚狀如科斗大者尺餘背色青白有黄縷文無鱗無腮無膽腹下白而不光率以三頭相從為一部彼人春月甚貴之尤重其乳原有二種色淡黑有文點者名斑魚毒最甚陶覽云河豚魚雖小而獺及大魚不敢啖之王充論衡云萬物含太陽火氣而生者皆有毒在魚則鮭與􅯚䱙故鮭肝死人􅯚䱙螫人談乘水鹹淡之交出河豚怒氣滿腹腹中之膟曰西施乳博雅云鯸䱌魨也觸物即怒魨即豚按唐平曽獻李固鯸鮧賦言此魚觸物而怒翻身上波録異記鯸鮧魚文斑如虎俗云煑之不熟食者必死饒州有吳生因誤傷妻成訟舉族懼有明刑之辱餉以生鯸鮧如是數四竟不能害益加充悦俄㑹赦𦙍嗣繁衍以夀終雨航雜録黄駒即􅀈魚俗所謂河豚也一名鮭一名嗔一名鮠一名䲭夷一名鯸鮐其肝最毒獨眼者尤甚海上人得之去其頭尾用橄欖甘蔗煑之然初出時可食至後則其毒尤甚諺曰蘆青長一尺不與河豚作主客予鄉春時延客不得此為不敬然亦有食而死者或曰煑熟則無患多食亦發􅅑厚生者所當慎樂清人名烏狼膏陳藏器云􅀈魚肝及子有大毒入口爛舌入腹爛腸肉小毒人亦食之煑之不可近鐺當以物懸之一名鶘夷魚以物觸之即嗔腹如氣毬亦名嗔魚腹白背有赤道如印其目得合與諸魚不同海中者大毒江中者次之養魚經河豚目能開闔能作聲鱗中之毒品也凡烹調腹之子目之精脊之血必盡棄之洎二皮肉肝之有斑眼之赤肝之獨包鉗之一異具不可食中毒者水調槐花末或龍腦水或橄㰖子皆可解反荆芥等風藥服風藥而食之者死物類相感志以荆芥煑其子候如芡大易荆芥再煮至復小乃可食又有斑魚似河豚而小食者雖無恙然亦其種類時珍以毒更甚洄魚一名水底羊東坡有洄魚詩時魚時魚似魴厥味肥媺品髙江東價百鱣鮪界江而西謂之瘟魚棄而不餌養魚經鰣魚盛于四月鮮白如銀其味甘美多骨而速腐廣州謂之三黧之魚閩志大者長數尺春末有之李時珍云鰣形秀而扁似魴而長肉白中多細刺如毛何景明稱其銀鱗細骨彭淵材恨其美而多刺也大者不過三尺腹下有三角硬鱗如甲其肪亦在鱗甲中自甚惜之其性浮㳺漁人以絲網沉水數寸取之一絲罣鱗即不復動才出水即死且易餒敗袁達禽蟲述云鰣魚罥網而不動護其鱗也不宜烹煑惟以筍莧芹荻之屬連鱗煑蒸食乃佳亦可糟藏之鱗與他魚不同石灰水浸過曬乾層層起之以作女人花鈿甚良雨航雜録箭魚即鰣魚也腹下細骨如箭簇首夏以時至而名本朝甚貴之本草稱其補虚勞稍發疳痼肋似箭而小武林遺事每嵗五月富春江上時魚最盛􅈄人捕之移時百里達於城市或云此魚自漢江來非富春産富春上下非夏無此人以是竒之按孫愐云時魚出江東今江中皆有而江東獨甚應天府以充貢每四月鱭魚出後即出云從海泝上人甚珍之惟江以西呼作瘟魚畏而不食鮧魚鮧魚偃額兩目上陳頭大尾小身滑無鱗或名曰鮎粘滑是因爾雅翼釋名鮧一名鰋又名鮎無鱗大首偃額大口大腹鮠身鱧尾有齒有胃有鬚者是矣生流水者色青白生止水者色青黄大者亦至三四十斤赤目赤鬚無腮者殺人説文􅀈訓鮀即鮎按鮎粘滑無鱗韓保昇謂口腹俱大者曰鱯背青口小名鮡背黄腹白名鮠江東通呼作鮧其字亦作鮷鯷李時珍云凡食鮎鮠先割翅下懸之則涎自流盡不粘滑也衍義云鮧魚形少類獺有四足腹重墜如囊身㣲紫色嘗剖之中有三小蟹又有四五小石塊如指面許小魚五七枚然無鱗與鮎鮠相類今未見用者按此似名同而種别鯷音題魚有名鰾匹妙切亦號為鯷化而為人曾謁仲尼鬛㦸鱗甲由也仆之陳蔡之厄天濟聖饑衝波傳云名鰾者疑承本草鱁鮧注而譌之也盖鱁鮧釋名鰾陳藏器音逐題乃魚白而李時珍音逐夷云音題乃鮎也大觀本草鱁鮧作鱁鯷養魚經鯷大首方口背青黑而無鱗是多涎按傳孔子厄於陳蔡夜有一人長九尺皁衣髙冠咤聲動左右子路出與戰相搏乆之孔子曰何不探其腮如其言仆于地乃一大鯷魚也孔子曰此物胡為來哉吾聞物老則羣精依之凡六畜之物皆能為怪故謂之五酉一作酋五行之方皆有其物酉者老也物老則為怪殺之則已鱟音蔲魚鱟形如帆與便面同厥足二六雌常負雄漁人取之必得其雙子如麻子南醬是供爾雅翼形如恵文亦如便面恵文者秦漢以來武冠也便面古扇也背黑而穹張敞所用以拊馬者今號溫凉扇大率鱟善候風故其音如候也其雌負雄雖風濤終不解故號鱟媚失䧺則不能獨活腹中子無數如麻子大或云亦罅裂而生未知其審雜俎鱟雌常負䧺而行漁者必得其雙南人列肆賣之䧺者少肉埤雅云雄多肉舊說過海輒相負於背髙尺餘如帆乘風㳺行今殻上一物髙七八寸如石珊瑚俗呼鱟帆成式荆州得一枚王敬美閩部疏鱟之為物介而中坼厥血蔚藍熟之純白尾鋭而長觸之能刺㫁而置地其行郭索雌常負雄觸笱而逝或得其雄雌亦就斃瀕海諸郡以鱟皮代杓嵗省銅千餘斤李時珍云鱟廣尺餘其甲瑩滑青黑色􅌯背骨眼眼在背上口在腹下頭如蜣蜋足似蟹在腹兩旁殻入香中能發香氣脂燒之可集鼠南人以其肉作鮓醬小者名鬼鱟食之害人雨航雜録鱟形如覆釜大如車青褐色其血碧口足皆在覆釜下足有十二長五六寸尾勁而尖長二三尺有刺三稜如㯶莖能觸傷人尾中有珠如粟色黄雄小雌大置之水中雄者浮雌者沉南人或帶其珠或磨飲之云利市殻堅硬腰間横文一線軟可屈摺每一屈一行牝常負牡牝牡相隨牝者背有目牡者則無牝去則牡死故海上稱婦女健壯􅋵家者作鱟是物在海羣行輒相積於背髙尺餘人呼鱟帆其衆如牌筏名鱟簰東夷取其殻作冠次于白角尾作小如意子如麻子溫人取以為醬甚美續博物志鱟皮殻堅鋭然性畏蚊蚊小螫之輒斃埤雅尾燒之可辟蚊暴之日中往往無恙隙光射之即死其藏伏沙上亦輒飛躍常逺行迹數步如兔擺蹤足似蟹腹中有子如粟而大中醢謝肇淛五雜組云唐皮日休以鱟魚殻為樽澀峰齾角内𤣥外黄謂之訶陵樽好竒之甚閩人以為杓入沸湯中甚便不聞可作樽也海味索隠鱟箋形如覆釜色如紺碧血如蔚藍尾如秃㦸負如浮圖行如屈折眼竅于背足攅於腹珠綴于肋乘風曰帆聫逰曰筏伏雌曰媚竒形異狀莫詳其說林日瑞漁書云鱟魚殻如箕雌者腹中子如黍米可數升尾如鎗長二尺餘身分兩截下截裏面有葉如冊葉然呼為鱟冊兩傍有刺其身肉口腹足螯俱在上截足盡處有二小佩狀似刀鮮食作醢並佳四五月間多蠡史曰古人視鴟制柁視鱟制帆以余論文事武僃俱焉身披甲胄尾常帶鋒左右有刀足如列㦸非武備乎腹滿珠璣腰帶書冊非文具乎雄雌相隨不以變故易節更足以風另一種名黄鱟能殺人又不可不辨䱟鯺魚有䱟鯺一頭數尾有脚如蠶食之肥美玉篇此魚一頭數尾長二三尺左右有脚狀如蠶可食郎君子鮝應入海錯部郎君子鮝雄雌相雜置之醋盂逡巡便合下卵如粟頃刻廿卅善治産難誕生如達本草名郎君子元文類作郎君子鮝主治婦人難産手握之便生極騐唐李珣云郎君子生南海有雌雄狀似杏仁青碧色欲騐真假口内含熱放醋中雌雄相逐逡巡便合下卵如粟狀者真也亦難得之物顧玠海槎録相思子狀如螺中實如石大如豆藏篋笥積嵗不壊若置醋中即盤旋不已此即郎君子又宋周公謹云長生螺置之醋中則活䲛魚當附鮆後潛有䲛當作鰽魚飛有􅹸當作􅀈鳥同是一物互為形表鳥藏魚出變化莫曉按䲛音崩音孟其字亦作鯍􅀈周雒曰鮪蜀曰䱎䲛此贊的是鰽字之誤釋名鱭一名鰽廣韻鰽音遒亦作鮂音啾此魚鳥所化頂上有細骨如禽毛異物志鰽魚初夏從海中泝流而上長尺餘腹下如刀肉中細骨如鳥毛云是􅀈鳥所化故腹内尚有鳥腎二枚其鳥白色如鷖羣飛至夏鳥藏魚出變化無疑鱷鱷似蜥蜴一卵百子或如白虺或成蒼兕喙餘三尺長尾利齒岸棹渇虎人肉為胏造化至仁胡為育此感應經云聞廣州人說鰐魚能陸追牛馬水中覆舟殺人值􅃠則不敢觸有如此畏懼其一孕生卵數百于陸地及其成形則有虵有龜有鼈有魚有鼉有蛟凡數十類及其被人捕取宰殺之其靈能作雷電風雨此殆神物嶺表録異鰐魚其身土黄色有四足修尾形如鼉而舉止趫疾口森鋸齒往往害人南中鹿多畏懼此物鹿走崖岸之上羣鰐嘷叫其下鹿必怖懼落崖多為鰐所得亦物之相懾伏也故太尉相國李徳裕貶官潮州經鰐魚灘損壊舟船平生寳玩古書圖畫一時沉失遂召舶上崑崙取之見鰐極多不敢輒近乃鰐魚之窟宅也潮志府東惡溪唐西郡西湫水中有鱷魚唐刺史韓愈作文驅之遂徙宋陳堯佐亦嘗殺鱷萬震南州異物志鰐齒網羅則斷如刀鋸居水中以食魚為本真臘風土記鰐魚大者如船有四脚絶類龍特無角耳肚甚脆美南海有魚其名為鱷其身已朽其齒三作李淳風物類相感志博物志南海有鱷魚狀似鼉斬其首而乾之椓去其齒而更生如此者三乃止洽聞記扶南國出鱷魚大者二三丈四足似守宫狀常生吞人王令人捕此魚置壍中以罪人投之若合死鰐乃食之無罪者嗅而不食此魚别號忽雷熊能制之握其觜至岸裂擘食之一名骨雷秋化為虎三爪出南海思雷二州臨海英潘村多有之捜神記扶南王名范㝷池在今梧州城東䱐䰽魚有䱐䰽或名江豚欲風則涌恒隨浪翻即海豚陳藏器云海豚生海中候風潮出沒形如豚鼻在腦上作聲噴水直上數百成羣其子如蠡魚子數萬隨母而行人取子繫水中母自來就而取之江豚生江中狀如海豚而小出沒水中舟人候之占風郭璞賦江豚海豨注江豚似豬鼻中有聲胸上有乳無鱗黑色多脂膏海豬體魚頭似豬韻府江豚脂亦同奔䱐豚或作㹠俗名江豬豚將風則踴鼉將雨則鳴故以㹠䜟風以鼉候雨漁書江㹠土名白鯃身大而長白色出入波浪中見則有風䱐䰽之魚出淮及五湖黄肥不可食大如百斤猪數枚相隨浮沉自如魏武帝四時食制李時珍云狀大如數百斤猪形色青黑如鮎魚有兩乳有雌雄類人數枚同行一浮一沉謂之拜風其肉肥不中食膏最多和石灰艌船良魚舅嘉州魚舅載新厥名鱗鱗迎媵夫豈其甥其文實鯦江圖可徴爾雅注鯦似鯿而大鱗肥美多鯁一作􅀈今江東呼其最大長三尺者為當魱音胡郡國志嘉魚蜀中謂之拙魚亦名魚舅弓魚西洱弓魚三寸其修誰書以公音是字謬又哂多子亦孔之羞弓魚見魚譜今誤作公大理志洱河出公魚似鰷細鱗長不滿尺大小俱有子味極佳美滇諺既誤作公魚而怪其有子遂綴謔語大理公魚皆有子雲南和尚豈無兒􅺘魚􅺘兒極𦕈僅若鍼鈎盈咫萬尾一筋或是觔千頭漁師取之不以􅃠收來如陣雲壓幾沉舟名曰跳艇厥義可求按􅺘鯔全此必鱊兒之訛鱊音聿爾雅鱊鯞小魚是也段公路北户録廣之恩州出鵝毛脡用鹽藏之其細如毛其味絶美取不用網夜乘小艇張燈其中魚見燈光輒上須㬰而盈多則滅燈否則不能載矣郭義恭所謂武陽小魚大如鍼一片千頭土人以作醬者又一統志廣東陽江縣出之即鱊兒魚也然今興國州諸處亦有之彼人呼名春魚云春月自岩穴中隨水流出狀似初化魚苖土人取收曝乾作脡以充苞苴食以薑醋味同蝦米寧國府涇縣琴溪産細魚僅如小棗核狀類鯽苖然多子土人炙乾以充逺遺食之爽美即呼琴魚或呼麥魚賔退録寧國府涇縣東北二里有琴溪溪側石臺髙一丈曰琴髙臺溪中别有一様小魚俗傳琴髙投藥滓所化號琴髙魚嵗三月數十萬一日來集漁者網取漬以鹽而曝之州縣須索無藝以為土宜舊亦入貢乾道間始罷閩中又有一種丁香魺似銀魚而短小腹博皆鱊之類雨航雜録䦨胡如小鰍而短大者如人指長三五寸頭有斑㸃如星潮退數千百跳躑塗泥中土人施小釣取之一名彈塗以盂覆活者數百于地旦發視之皆駢首拱北蓋亦朝斗之意𤣥脩者忌食此雖小魚别種亦其類附識之林日瑞漁書云彈塗一名鮡魚小而穴處潮至出逰水上以跳為行其色藍有小點白文如畫肉軟而味佳異魚圖贊箋卷一
