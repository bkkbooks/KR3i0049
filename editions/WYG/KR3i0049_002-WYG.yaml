body:
  text: 異魚圖贊箋卷二明楊慎原本大學士胡世安箋鯪魚吞舟之魚其名曰鯪背腹有刺如三角菱罟師畏之網羅莫膺臨海水土志諸説無及吞舟者按異物志鯪魚吐舌蟻喜附因吞之或是吞蟻之魚舟字疑誤山謙之南徐州記鯪魚若鯉四足吳都賦所謂鯪魚若獸風土記鯪四足如獺腹背有刺如三角菱沈懷逺南越志鯪魚形如蛇而四足腹圍五六寸頭似蜥蜴鱗如鎧甲李時珍云鯪鯉狀如鼉而小背如鯉而濶首如䑕而無牙腹無鱗而有毛長舌尖喙尾與身等尾鱗厚鋭有三角腹内臟腑俱全而胃獨大可容蟻升許常吐舌誘蟻吞之因能水能陸故冐鯉名按志罟師畏之之語似海産非穴處者按太平御覧所載引山海經鯪魚吞舟及臨海記鯪魚背腹皆有刺如三角菱豈水中别有此種非穴居之鯪魚耶勁䱜南越勁䱜揚鬐排流洞腹養子朝泳暮游臍入口出貯水若抽鱗皮斑駮可飾蒯緱沈懷逺南越志䱜魚土人謂之瓌雷魚通身黒長二丈子朝出食暮還母腹從臍中入旦從口中出腹裏有兩洞腸貯水以養子腸容二子兩腸則四子也其腮鱗皮有珠文可以飾刀劒口一云鳥䱜魚又蝦䱜長五丈尾似蝦鱕䱜鼻有横骨如轓海中波浪為之滿海船逄之必斷縣載見吳錄潘州記雜爼云章安縣出頰赤如金甚健網不能制俗呼河伯健兒惠志云子出入風驚浪湧沈瑩臨海水土異物志䱜魚鹿文青目腹下正白長五丈虎䱜長三丈黄黒斑文耳目齒牙有似虎形唯無毛或變成虎雨航雜錄䱜魚長二丈大數圍小者圓廣尺餘狀如鱉無足背麤錯有文皮皆鑢物子小隨母覓食驚則還入母腹一名鮫魚皮間有珠可飾劒有横骨在鼻前如斤鋸者曰胡沙性良肉美石首魚石首之魚有石在頭瑩白如玉可植酒籌嶺表錄異石頭魚狀如鰌魚隨其大小腦中有二石子如蕎麥瑩白如玉有好竒者多市魚之小者貯于竹器任其壞爛即淘之取其魚腦石以植酒籌頗脱俗李時珍云生東南海中形如白魚扁身弱骨細鱗黃色如金首有白石二枚田九成遊覧志每嵗四月來自海洋綿亘數里其聲如雷海人以竹筒探水底聞其聲乃下網截流取之澄以淡水皆圉圉無力初水來者甚佳二水三水來者魚漸小而味漸減矣炙轂子石首鯼也首有小石故名海族志其初出水也能鳴夜視則有光鹽曬為鱐則曰白鮝閩謂之金鱗又謂之黄瓜臨海異物志石首小者名䠓水其次名春來石首異種也雲間志腹中白膘可作膠雨航雜錄鯼即石首魚也小者曰􅀈又名䠓魚最小者名梅首又名梅童其次名春來土人以槐豆花卜其多寡槐豆花繁則魚盛腦中有白石如碁子取其石次以作器或飲食遇毒則暴裂腦漏者用其石燒灰吹入鼻中即愈又下石淋炙食之主消瓜成水又有䱟形相似左右三牙如鐵鋸或曰石首雄䱟其雌也南越志謂䱟雄石首諸魚有血石首獨無血僧人謂之菩薩魚至有齋食而啖者亦三净肉意葢不能忍口腹而姑以此説自解也石首亦冐黄魚名海味索𨼆鰉黄各種肉與味不同四明梅魚比黄魚極小肉味正相似閩中呼為小黄魚其鱗色燦爛金星如大黄魚也又各一種張九􅉄銘合鰉黄一種誤矣葢鱘鰉别一種黄魚其謂之石首者以腦中藏二白石子得名又謂洋生魚土人從小滿節候黄魚散子在海洋中魚貫串若山移而過商人倩漁師聽魚聲乃報曰釣魚來有幾里幾里云漁者舉網或得千萬頭或空不得盖遇與不也石首化鳬南有魚鳬國古蜀帝所都婁縣石首魚至秋化為鳬魚鳬之名義泝此可求諸張勃呉録吳地志石首魚至秋化為􅃣鳬頭中猶有石述異志在吳郡魚城城上水中韋昭春秋外傳石首成􅝶􅝶鴨也養魚經石首之魚其色如金俗名黄魚楝花而來秋而化鳬比目魚東海比目不比不行兩片得立合體相生狀如鞋屧鰈實其名山海經圖東海有鰈魚即比目魚也不比不行古之王者將行封禪東海貢此魚注狀如牛脾鱗細紫白色一眼兩片相合方能行江東人呼王餘魚郭璞贊比目之鱗别號王餘雖有二片其實一魚協不能密離不為疎按比目王餘自是二種何得比而同之吳都望海二賦原自明晰而解者誤㑹也緣未覿形耳嶺表錄異比目魚南人謂之鞋底魚江淮謂之拖沙魚異物志云似左右分魚南越志謂之板魚亦曰左介臨海水土記板魚片立合體俱行一名鰜一名兩魪又相如賦禺禺魼鰨注魼鱸同音區鰨鰈仝比目魚也按山海經魼魚羽在脇下又鯢魚亦有鰨名音塔耳雜爼王者徳及幽隠則比目魚至雨航雜錄竹夾魚似比目而肉堅身圓尾尖色青黒一名土鱧通考漢天子臨軒設樂激水成比目魚跳躍噀水作霧翳日化黄龍長數丈出水遊戲王餘王餘孤游比目䨇逝水旣有之陸亦相儷單鵙匹鵹性亦相似吳都賦䨇則比目片則王餘孫綽望海賦王餘孤戲比目䨇游博物志吳王江行食鱠之餘棄中流所化今魚中名吳王鱠餘者長數寸大者如筯猶有鱠形又名鱠殘皮日休詩隐几船舷無一事分明數得鱠殘魚養魚經鱠殘之魚狀如銀魚而大冬月帶子者謂之挨氷嘯或以即銀魚非銀魚形纎細明瑩如銀太湖之人多鱐以鬻長不過三寸凡魚嘯子以夏惟銀魚鱠殘嘯子于氷氷觧三日乃生也李時珍云出蘓松浙江大者長四五寸身圓如筯潔白如銀無鱗若已鱠之魚但目有兩黒㸃耳彼人尤重小者曝亁以貨四方清明前有子食之甚美清明後子出而瘦但可作鮓腊耳趙宧光云海中小白魚長三四寸許若蟲類者曰鱖殘其形潔白方言謂之麺魚士人傳言吳王食鱠吐臸水中所化因改作鱠又一種湖中出者夏小寸許秋長盈尺亦曰殘魚小者加之美名曰銀魚皆鱖屬舊志吳王食鱠有餘棄水中所化名王餘魚越王食魚未盡以半棄水所化遂無一面名半面魚瀘州合江縣産木𤓰魚以木𤓰時出故名膚如築玉稍大如寳坻魚而肥美絶倫亦王餘類易林鵹必匹飛鵙必單棲鰕魚鰕實四足而有魚名頭尾類鯷岐岐一作跂而行長生山澗出入沉浮云是懶婦怨懟自投異物志舊賛本艸鯢魚大者曰鰕音霞異物志魚之能以足行如蝦故名述異記淮南有懶婦魚俗云昔楊氏家婦為姑所溺而死化為此魚其脂膏可燭佛經謂之饞燈鳴瓊泛醳則明披緗辟纑則暗一名魧餘詳目錄鰼鰼魚鼓翮十運一翼􅀈翻厥名或作鳴如鵲鱗在羽端郭璞贊山海經涿光之山囂水出焉中多鰼鰼之魚狀如鵲而十翼鱗在羽端聲亦如鵲可以禦火食之巳癉亦見述異記文魮形如覆銚包玉含珠有而不積泄以尾閭闇與道會可謂竒魚郭璞鴽鮆贊海經鴽鮆江賦文魮孕璆音磬鳥首魚尾出鳥䑕穴禹貢攸紀山海經濫水西注于漢中多鴽鮆之魚狀如覆銚鳥首而魚翼音如磬石之聲是生珠玉文選江賦丈魮孕璆玉篇云魮有兩翼尾有毒亦作後贊鳥䑕云云亦䝉山海經非禹貢也飛魚飛魚身圓長丈餘登雲游波形如鮒翼如胡蟬翔泳俱仙人寗封曽餌諸著藻灼爍千載舒衍王子年七言頌林邑記云飛魚身圓大者丈餘翅如胡蟬出入羣飛游翔翳薈沉則泳於海底中山經牛首山勞水出焉西注于潏水是多飛魚其狀如鮒食之已痔衕一統志陜西鄂縣勞水出又騩山正囘之水北注于河中多飛魚狀如豚而赤文有角佩之不畏雷霆亦可禦兵當是另種雜爼朗山浪水有魚長尺能飛飛即凌雲空息歸潭底拾遺記仙人寗封食飛魚而死二百年更生故寗先生遊沙海頌云青蕖灼爍千載舒百齡暫死餌飛魚吳都賦文鰩夜飛而觸綸注長尺許翅與尾齊一名飛魚陳藏器云生海南羣飛海上海人候之當有大風按西山經㤗器山觀水出焉多文鰩魚狀如鯉魚身而鳥翼蒼文而白首赤喙常行西海遊于東海以夜飛其音如鸞雞其味酸甘食之已狂見則天下大穰王鮪王鮪岫居科斗其面性最有毒獺所不噉人饒食之肥美盈燕東京賦王鮪岫居毛詩義疏所謂鞏縣東雒度北崖上山腹穴是也舊説北穴與江湖通鱣鮪從北穴而來入河埤雅鮪岫居至春始出而浮陽北入河西上龍門入漆沮見日而目眩又水經王鮪出鞏穴蜀曰䱴䲛三月遡河上能度龍門則為龍宋景文公筆記河陽出王鮪魚形如豕口與目皆在腹下每春二月出于石穴逆河而上乃取之按夏小正注魚之先至而美者陳藏器云生江中背如龍李時珍云亦鱣屬也長者丈餘狀如鱣而背上無甲其色青碧腹下色白其鼻長與身等口在頷下食而不飲頰下有青斑文如梅花狀尾岐如丙肉色純白味亞于鱣鬐骨不脆羅願云鮪狀如鬵鼎上大下小哆口頭大而尖如鐵兠鍪亦能化龍膘可作膠漢志卭部有河中産魚長一二丈頭特大遙視如戴鐵釜狀即鮪也釋名一名􅀈鮹七八尺者益州人謂之鮪鱨大者王鮪小者叔鮪更小者建平人呼鮥子也一名䲋或作鱏一名碧魚今東萊遼東謂之尉魚或名仲明魚以樂浪尉仲明溺海中化此魚飲膳正要云遼人名乞里麻魚燕山錄鵜鶘飲水數升而不足鱣鮪入口若露而死丹魚丹水丹魚出于南陽以夜伺之浮水有光夏至十日其期不爽取血塗足水上可行抱朴子抱朴子南陽丹水出丹魚常先夏至十日夜伺之魚浮于水赤光上照赫然如火網取之割其血以塗足可歩行水上如履平地按述異所載同但云丹水出龍巢山下風土記亦同云丹水在内鄉縣䱤音陷又音紺魚海有䱤魚衆魚蓐母魚欲生卵觸腹以首蛇醫雁奴物性固有雜爼凡諸魚欲産䱤魚輒䑛其腹世謂之衆魚之生母異苑所載同但云諸魚欲産䱤輒以頭衝其腹云木艸鱤一名䱤一名鰥一名黄頰魚鱤敢也䱤䐄音陷也食而無厭也健而難取吞陷同類力敢而䐄物者也其性獨行故曰鰥李時珍云生江湖中體似鯼而腹平頭似鯇而口大頰似鮎而色黄鱗似鱒而稍細大者三四十斤啖魚最毒池中有此不能畜魚山海經番條山澸水出焉中多鱤魚又姑兒山之水多鱤魚是也異苑云然諸魚生子必雄魚衝其腹仍尿白以葢其子不必盡待䱤魚也山海經陽山留水出焉南注于河中有䱤父之魚狀如鮒魚首而彘身食之巳嘔此另種望魚當附鮆後明都滏澤望魚之沼形側如刀可以刈草魏武帝四時食制魏志望魚側如刀可以割草出豫章李時珍云鱭魚形如劑物裂篾之類故有諸名魏武食制云望魚鮫天淵魚虎老化為鮫其皮朱文可飾弓刀任昉述異記虎魚老者為鮫雜爼魚二百斤為鮫南山經禱過山浪水出焉中有虎鮫其狀魚身而蛇尾其音如鴛鴦食之不腫可以已痔中山經荆山漳水出焉東南注于睢多鮫魚皮有珠文而堅可飾刀劒尾有毒劉歆期交州記鮫海魚出合浦長三丈狀似鼉而無足背上有甲珠文堅強可飾刀劒又可以鑢物按左思賦扈帶鮫函則亦可飾甲矣韓景昇云圓廣尺餘尾亦長尺許背靣粗錯李時珍云古曰鮫今曰沙是一類而有數種形並似魚青目赤頰背上有鬛腹下有翅味並肥美南人珍之大者尾長數尺能傷人皮皆有沙如眞珠斑其背有珠文如鹿而堅彊者曰鹿沙亦曰白沙云能變鹿背有斑文如虎而堅彊者曰虎沙亦曰胡沙云虎魚所化鼻前有骨如斧斤能擊物壞舟者曰鋸沙又曰挺頟魚亦曰鱕䱜鮫之為魚其子旣育驚必歸母還入其腹小則如之大則不復楊孚交州異物志舊贊雜爼鮫子驚則入母腹博物志東海鮫䱜生子子驚還入母腹尋復出陳藏器云其魚狀貌非一皆皮上有沙堪揩木如木賊也小者子隨母行驚即從口入母腹中雨航雜錄馬鮫魚形似鰫味似鯧亦曰社交以交社而生此疑别種漁書云馬鮫無鱗翅色蒼藍而有文采一種名釘柱一統志謂廣州海産肉厚骨軟諺云海中馬鮫鯧味之最也龍魚龍魚一角似鯉居陵候時而出神聖攸乘飛驚九域騎龍上升文選龍鯉一角即此篇海龍角魚名鯛音周又電白海中出龍鯉海外西經龍魚陵居狀如狸一作鰕即有神聖乘之以行九野一曰鼈魚在天野北其為魚也如鯉絳河去日南十萬里多赤龍魚上仙服之後天而老龍魚之川在汧之堧河圖授羲實此出焉神行九野如馬行天陜志魚龍川源出小隴山中有五色魚人不敢取因名杜詩水落魚龍夜孝經援神契天子孝天龍負圖尚書中候河龍出圖成赤文綠字以授軒轅烏魚烏魚戴星禁在仙經鯇鮦鱧蠡紛其别稱其膽獨甘以是為徴野紀烏魚即鱧首有七星夜朝北斗道家稱鱧悳朝斗有臣禮以為三厭之一此物最耐乆不死如旱涸中乾枯經歳得水復活玉皇本行集經􅀈魚腐于泥得水而再活豈即此耶此物食魚為魚中之虎其子最繁李時珍云形長體圓頭尾相等細鱗𤣥色有斑㸃花文頗類蝮蛇有舌有齒有肚背腹有鬛連尾尾無岐形狀可憎氣息胜惡食品所卑南人有珍之者格物志凡魚散子不沫其子唯文鱧沫子而長舊云是公蠣蛇所化至難死或謂之鰹爾雅鰹大鮦小者曰鮸爾雅翼鱧又名文魚與蛇同氣俗呼黒魚盖北方之魚也本艸一作蠡魚諸膽苦惟鱧膽甘又注云鱧非鯇形似鯉詳前鯶箋豈鰹音之誤瓊魚仙人上藥劉淵瓊魚昔西王母漢武受圖銀刀尾尾今乃其餘漢武内傳西王母曰仙人上藥有劉淵瓊魚杜詩出網銀刀亂注銀刀魚也石桂魚石桂之魚天仙所餌猶有桂名鱖借音爾流水桃花悳隠詠美養魚經鱖魚巨口而細鱗肉味鮮美背黒有斑彩或云仙人劉慿常食名桂魚今此魚鄉之人猶有桂之呼焉石桂魚本艸名鱖魚以其體不能屈曲如僵蹶也又名魚以其紋斑如織􅖯也其味如豚又名水豚名鱖豚扁形濶腹大口細鱗黒斑厚皮𦂳肉肉中無細刺者是也按斑色明者雄稍暗者雌背有鬐鬛刺人李廷飛延夀書云鱖鬐刺凡十二以應十二月每月一刺有毒人誤中之者惟橄欖核磨水或橄㰖煆存性調長流水服即解也夏月居石穴冬月偎泥罧魚之沈下者一云鱖性癡見人則樹其鬛謂人懼已也又性畏寒爾雅翼牛羊之屬有肚故能嚼諸魚不然而鱖獨有肚能嚼亦啖小魚江南名鮰唐張志和詩桃花流水鱖魚肥又中山經合水出于半石山隂而北注于雒多鰧音滕魚狀如鱖音桂居逵水中之穴道交通者蒼文赤尾食之不癰可以已瘻今按鰧形狀居止功用俱與鱖同日華子謂鱖水豚豈音疑此與漁書云海中産者名鱠魚春水浪深至初夏始有得之横公魚北方石湖有横公魚化而為人刺之不殊煑之不死游鑊育育烏梅廿七煑之乃熟約𤣥黄録神異錄北方荒外有石湖方千里岸深五丈餘恒氷唯夏至左右五六十日解耳中有横公魚如鯉而赤晝在水中夜即化人刺之不入煑之不死若以烏梅二七箇煑之即熟可治邪病按述異記神異經所載同或作黄公魚長七八尺食之無鯁魚豢魏略文帝將受禪赤魚游于露鑊乃此魚也其性自然乃矯飾以為瑞應異魚圖贊箋巻二
