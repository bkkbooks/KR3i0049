body:
  text: 異魚圖贊箋卷四明楊慎原本大學士胡世安箋螺貝蜃蚶海錯附􅡷􅠦􅡷􅠦海魧名曰匽鼂形大如䉬出自沙嚻一枚剖之有三斛膏音迷麻説文名匽鼂江賦名􅡷􅠦臨海水土志曰海魧實一物也生海邊沙中肉甚美多膏臨海水土志鼂似􅔢一名鼂鼊狀似􅔢鼊而甲薄形大如龜味極美一枚有三斛膏或云腹如羊胃可啖按蘆䉬即蘧蒢海篇附載􅀢􅖚音促秋似蝦蟇居陸地山海經注鼀黽似蟇小而青或曰蠖黽一物名耳􅀈􅀈音顛奚蛙類似蜘蛛出遼東土人食之􅔢鼊􅔢鼊龜頭鱉身蝦尾斑似玳瑁漫無甲指贉飾卷軸緗帙增美劉欣期交州記蚼􅨐似玳瑁大如笠四足漫胡無指爪其甲有黑珠文朵斑似錦文但薄而色淺不任作器惟堪貼飾今人謂之鼊皮海録碎事爾雅翼俱云然且言頭有兩角説文䵶􅀈屬頭兩角出遼東是也當即奚善鳴者故從句或謂即蟕蠵之小者并見前目録李時珍謂􅔢鼊者南人呼龜皮之名也臨海水土記形如龜鱉身具甲黃點有廣七八寸長二三尺彼人以亂玳瑁肉味如黿可食卵大如鴨卵正圓生食美于鴨卵即雜爼係臂如龜入海捕之人必先祭又陳所取之數則自出因取之若不信則風波覆船故楊孚嶺南異物贊云係臂如龜生于海州欲先捕之必祭以求有不信者風波覆舟海月海物正圓名曰海月脂如搔頭有緣無骨海賦江圖藻詠互發劉恂嶺表録異海月大如鏡白色正圓嘗死海旁其柱如搔頭尖其甲美如玉雨航雜録云土人鱗次之為天窗本草即作江珧一物陳藏器云蛤類似半月故名水沫所化煮時猶變成水江賦玉珧海月土肉石華謝靈運詩揚帆采石華挂席拾海月漁書云海月一名蠔鏡圓似月似蛤而扁海鏡海鏡殼圓中甚瑩膩腹有小蟹朝出暮至或生剖之蟹子跂跂逡巡亦斃嶺表録異海鏡廣人呼為膏藥一作葉盤兩片合以成形殼圓而中甚瑩滑白照如雲母光內有少肉如蚌胎腹中有紅蟹子大如黃豆而螯足皆具海鏡飢則蟹出拾食蟹飽歸腹海鏡亦飽或迫之以火則蟹子走出離腸腹立斃或生剖之有蟹子在腹中逡巡亦斃任昉述異記南海有水蟲名曰筯蚌蛤之類也其小蟹大如榆莢開甲食則蟹亦出食筯合甲蟹亦還入為筯取食以終始生死不相離此亦海鏡之類江賦注瑣蛣一名海鏡南越志􅀈蛣腹蟹注大長二三寸腹中有蟹子如榆莢合體共生漢志鄞有鮚崎亭顔注鮚即蛣崎曲岸也其中多鮚因名漁書海鏡肉似蠔有小蟹生焉為鏡取食殼通明潔白取作窗􅎉可比琉璃水晶海鏡蟹為腹水母蝦為目虛有咸受羡補不足人固有之無惑乎物首二句見越絶書及郭璞江賦述異記瑣蛣形似蚌有一小蟹在腹中為蛣出求食蟹或不至蛣餒死人呼蟹奴嶺表録異水母形如覆帽腹下有物如絮而無口眼常有數十蝦寄腹下食其涎浮水上遇人捕之即沉乃蝦有所見耳博物志東海有物狀如凝血從廣數尺方圓名曰鮓魚無頭目處所內無藏衆蝦附之隨其東西人取煮食之北户録一名蚱一名石鏡海篇一名蝦虴一名蟦一名海靼音折狀象柔皮雨航雜録􅬅魚一名䱜一名摴蒱一名水母俗所謂海蜇也雨多水則是物盛其形如覆笠以蝦為目蝦動則沉土人食之皆以土積其實損脾南人以為性暖能治河魚疾陵龍陵龍之體黃身四足形短尾長有鱗無角南越海人嘉羞見逐臨海水土志本贊或作陵龜見爾雅攝龜注或作神龍南越志神龍龜大如拳金色上甲兩邊如鋸齒爪至利能緣木捕蟬至美可食不中于卜或作石龍子按石龍子生山石間似蛇有四足頭扁尾長形細長七八寸大者一二尺有細鱗金碧色大都鱗介之産非目見未易意度也山蠵嶺表蟕蠵是曰山龜人立其背可負而馳木楔其肉聲吼如牛叫魚其切巧匠琢之以為梳箆一名文龜廣志蟕蠵形如龜出交州山龜在山上食草長尺餘嶺表録異蟕蠵者俗謂之茲夷乃山龜之巨者人立其背可負而行産潮循山中鄉人採之取殼以貨要全其殼須以木楔出肉龜吼如牛聲響震山谷廣州有巧匠取其甲黃明無日腳者煮而拍之陷黑玳瑁花以為梳箆杯器之屬狀甚明媚按甲上有𣪚黑暈名日腳續搜神記鄱陽人黃赭入山采荆陽遂迷路數日忽見大龜赭更祝之曰汝是靈物而吾迷不知道今騎汝背頭向便是路龜即從右轉赭乘行十許里得溪水即估客舟行者也應劭云雄曰玳瑁雌曰蟕蠵按諸蕃志玳瑁形似龜鱉首嘴如鸚鵡背負十二葉黑白斑文間雜邉欄缺齧如鋸無足而有四鬛前長後短以鬛捍水而行老者甲厚而黑白分明小者甲薄而花字糢糊或曰取用必倒懸用滚醋潑之逐片應手而下出廣南産于海洋深處或云前兩鬛長狀如楫後兩鬛極短其上皆有鱗甲背甲十二片斑文相錯鱗差以成一背海人飬以鹽水飼以小鱗俗傳甲子庚申日輒不食謂之玳瑁齋日此則􅔢屬非山蠵類矣南州異物志玳瑁如龜生南方海中大者如蘧蒢背上有鱗大如扇取下因見其文欲以作器則煮之因以刀截任意所作俟其冷以鮫魚皮錯治之後以枯條木葉瑩之即光輝矣按史記趙欲誇楚簮劒器悉飾以玳瑁續漢書輿服志貴人助蠺玳瑁叉髙文惠與婦書今致玳瑁梳一枚晉潘尼有玳瑁碗賦此物之珍尚也久矣水蠵蠵惟水龜海一作涪陵是育其緣中文其甲堪卜馮夷所命切和靈曲爾雅靈龜注涪陵郡出大龜甲可以卜緣中文似玳瑁俗呼靈龜即今蟕蠵龜一名靈蠵能鳴郭璞贊水圓三方潛源溢沸靈龜爰處掉尾飬氣莊生是感揮竿傲貴南越志神龜出江水廬江郡嘗獻生龜于太卜冥含神知為效之大説文蠵以胸鳴其音如鼓雒神賦云馮夷鳴鼓是也又漢郊祀歌馮夷切和注馮夷水神名靈蠵也海蛤海蛤魁陸瓦壠獷殼外眉內渠形摯渾朴萬震南州志贊説文蛤有三種皆生于海蛤蠣千嵗鳥所化也海蛤百嵗燕所化也魁蛤一名復老服翼所化狀如海蛤圓而厚外有理縱橫即今蚶也爾雅謂之魁陸蘇恭云海蛤細如巨勝子光淨瑩滑者佳粗如半杏仁者名豚耳蛤不堪入藥沈存中筆談海蛤即海邊沙泥中得之大者如碁子小者如油麻粒黃白色或黃赤相雜蓋非一類乃諸蛤之殼為海水礲礪日久光瑩都無舊質不能分别為何蛤故通謂之海蛤吳晉謂海蛤頭有文文如鋸齒此乃魁蛤非海蛤也侯鯖録瓦壠獷殼渾沌錢文如建瓴外眉而內渠其名瓦壠注眉髙為睂渠疏為渠按周禮典瑞駔圭璋璧琮琥璜之渠眉先鄭注皆開渠為眉瑑瑑有圻鄂瑑起後鄭云渠眉玉飾之溝瑑也疏云六玉兩頭皆有孔又于兩孔之間為溝渠于渠之兩畔稍髙為眉瑑雜爼蛤蜊候風雨能以殼為翅飛海味索隱蛤與蚌同類而異形長者蚌圓者蛤海蛤蛤蠣蛤蜊齊蛤文蛤車蟄姑勞霓皆蛤也石􅎕蛤也待春而叢生也石華蛤也附石而零生也諸蛤皆産于海而又有黃蛤者甚佳贊云類若焦冥出于沙汀聚如繁星輕如蜂翎味如寧馨其于大者何不視之如丁丁而其于小者何不任之為形形蛤蜊生東海似蚌略小白腹紫唇兩片相合而生故曰蛤食之有利于人曰蜊又一種文蛤筆談名花蛤大者圓二寸小者圓五六分一頭大一頭小背上有花斑文本草注小紫斑者曰文蛤兩頭尖者曰齊蛤海上人云蛤蜊文蛤皆一潮生一暈又一種長橢者名為馬刀小圓者名蜆又一種蛤殼在海久被風濤亷稜消盡所存礧磈雜于泥沙有似碎石名海石皆入藥西王母云仙藥有白水霛蛤又一種名擔羅蛤類也生新羅國彼人食之主治熱氣消食臨海志蘆雉似蛤蜊殼小薄耳趙后外傳真臘夷獻萬年蛤光彩如月照人無妍醜皆美豔成帝以賜飛燕象山志珠巖絶頂一潭中有蛤色如金出遊水中雨隨至漁書云凡蛤之屬閉口聞雷鳴則不復閉每一潮生一暈海人認最真文蛤表有文如水墨畫漳南有二種大如升者殼上有文及毛小者文似但無毛耳潮州又有扁而長者味亦佳鄉中又有蛤螺赤觜之名又一種似蛤而薄者名沙勞大都海産味不及江北江瑶柱當附海月江瑶柱句厥甲美音裕句肉柱膚寸名江瑶柱萬震此贊尤古臨海異物志玉珧柱厥甲美如珧玉晉安南異物名記肉柱膚寸美如珧玉即江瑶也如蚌而稍大中肉腥而䏰韌同不中口僅四肉牙佳耳長可寸許圓半之白如珂雪一沸即起甘鮮脆美莫可名狀此所謂柱也王氏宛委録奉化縣四月南風起江瑶一上可得數百柱以雞汁瀹食肥美過火則味盡也海味索隱張將軍九嵕江瑶柱贊冠于石髓瓊漿美如瑶雲腴露膏圓而柱玉鬚氷筋倘生北海伯夷不采西山之薇以供赤松留侯永辟人間之榖笑説麟脂是俗美不堪大嚼屠門肉今之馬甲柱古曰玉珧厥名之珍海圖所標昔人賞之謂美無涯取類南來以配荔枝雜爼玉珧似蚌長二寸廣五寸上大下小殼中柱炙之如牛頭胘項雨航雜録玉珧一名蜃姚即江瑶柱也柱肉脆美其甲可飾刀鞘蓋蜃之小者惠州志一名馬頰出歸善縣韓退之所謂馬甲柱是也人有問東坡以荔枝風味云江瑶柱可敵之紫魼蘭陵紫魼江淹紫􅡖音銀是惟蚌類發華應春珠蝦錦蛤玉盤同珍荀子東海有紫魼即石劫也江淹集海人有云石􅎕一名紫􅡖蚌蛤屬也春而發華有足異者賦曰夫海若之小臣具品色于滄溟既爐天而鑄物亦吸化而染霛比文豹而無恤方珠蛤而自寧冀湖濤之蔽迹願州渚以淪形升庵亦有賦石􅨒生東南海中石上殼如海螯其色紫可食一名石鮭或謂即紫貝及石決明者非真臘記云有長八九寸者海味索隱石􅎕土名龜腳又名佛手蚶皆以象形立名其肉端有兩黑爪至春月𣪚開如華郭景純江賦瓊蚌晞曜以瑩珠石魼應節而揚葩謝眺紫􅡖曄春流王維去問珠官俗來經石􅎕春是也漁書云仙人掌一名龜腳生海礁上蚌屬上半為硬殼如掌下半緑皮裹肉如龜腳大不盈寸江文通以為紫􅡖郭景純以為石􅎕石決明鰒句步角切似蛤句無鱗有殼一面附石叶音錯細孔雜雜或七或八郭璞爾雅注此魚尤竒入藥品者以七孔八孔者佳北齊顔之推云鰒即石決明內旁一年一孔至十二孔而止以合嵗數登州所出其味珍絶光武時張步據青徐遣使詣闕上書獻鰒魚即此陶宏景云鰒魚甲附石生大者如手明耀五色內亦含漿主治青盲失精續博物志名九孔螺嶺南郡及萊海邉皆有之形長如小蚌而扁外皮甚粗細孔雜雜內則光耀背側一行有孔如穿成者七孔九孔良生石崖上海人泅水乘其不意即易得之否則緊粘難脫也功能明目故稱石決明五雜俎北地珍鰒魚每枚三錢漢王莽啖鰒魚慿几不復睡後漢吳良為郡吏不阿太守賜良鰒魚百枚又南齊有遺禇彥回三十枚者每枚值數千錢古人已重之矣東海夫人東海夫人淡菜有殼形雖不典而益帷箔求以象類堪為一噱陳藏器云東海夫人生東南海中似珠母一頭小中銜少毛味甘美南人好食之阮氏云淡菜生海藻上故治癭與海藻同功日華云雖形狀不典而甚益人煮熟食之能補五臟益陽事但多食令人頭目悶暗得微利即止掌禹錫嘉祐本草名淡菜浙人呼殼菜一名海蜌孟詵云平時燒食即苦不宜人與少米先煮熟後去毛再入蘿蔔或紫蘇或東瓜同煮即更妙唐明州嵗貢淡菜蛤蚶州守孔戣奏罷之漁書云淡菜形似蚌而小肉酷肖人隂生剖之肉白如玉元伊世珍嫏嬛記海産多肖人形戚車類男隂文齧類女隂文齧即淡菜亦名東海夫人海牛海牛魚皮潮信可卜潮至毛張潮退則伏刻象押簾招風斯速述異記東海有牛魚其形如牛海人採捕剝其皮懸之潮水至則尾起潮水落則尾伏博物志亦云臨海水土記魚牛象獺大如犢子毛青黃色其毛似氊知潮水上下一云東海有半體魚狀如牛剝皮懸之潮至則毛起潮去則毛伏詩義疏魚之大而有力者魚貍將潮將雨毛皆起潮還天晴毛則伏常千里外知海潮是也陳藏器云生東海其頭如牛一統志牛魚出女直混同江大者長丈餘重三百斤無鱗骨其肉脂相間食之味長異物志南海有牛魚一名引魚重三四百斤狀如鱧無鱗骨背有斑文腹下青色知海潮本草海牛生東海角硬尖鋭有紋身有龜背文蒼色腹黃白色有筋頂花點尾象魚主補腎今人房中藥多用之山東志文登縣北海中海牛無角長丈餘紫色足似龜尾若鮕魚性捷疾見人則飛赴水皮堪弓鞬脂可燃燈大蟹女丑大蟹其廣千里舉螯為山身故在水海陽専車曷云其比大荒東經女丑有大蟹廣千里又海內北經姑射國大蟹在海中亦千里之蟹汲冢書海陽巨蟹其殼専車有海賈忽見兩山出于波間各髙數丈已忽沒舟人云此蟹螯也詳廣異記彭螖爾雅彭螖玄經郭索均為蟹諡螖訛以越梁王醢化茲乃臆説爾雅螖蠌小者蟧郭注即彭螖也似蟹而小蟛蜞亦其類食之誤人矣太玄經鋭前一蟹之郭索後蚓黃泉墨客揮犀林逋詩草泥行郭索注蟹行貌太玄蟹之郭索用心躁也又髙似孫蟹賦其武郭索其行睢盱其心昜躁其腸實枯古今注蟛蚏小蟹生海塗中食土吳人螖訛作越遂附會其説謂漢祖醢彭越置其肉于江化此傅肱曰蟛蚏者二月三日盛出于海塗吳俗尤所嗜尚嵗或不至則指為禁煙謂非佳節也今通泰其類實繁然有同蟛蚏差大而毛好穴處田畝中名蟛蜞毒不可食沙狗蟹有沙狗亦似蟛螖穿沙為穴見人則蟄曲徑易通了不可得爾雅翼沙狗似蟛螖壤沙為穴見人則走不可得出南海雨航雜録沙狗穴沙中見人則走或曰沙鈎從沙中鈎取之也味甚美擁劔蟹有擁劔一螯偏大隨潮退殼隨退復裹力能鬬虎利其戟銼吳都賦注擁劔蟹屬從廣二尺許有爪其一螯偏大大者如人大指長二寸餘常忌護之如珍寶其利如劔故名其一螯尤細主取食雜俎擁劒二螯以大者鬭小者食是也古今注擁劒一名執火以其螯赤也埤雅一名桀步按爾雅翼隨潮退殼者攤塗力能鬭虎者蝤蛑贊混舉矣招潮蟹有招潮遡月而翹背向不失與潮相招􅀢物有知云誰之教一名望潮似蟛蜞生海中潮至出穴而望可食爾雅翼小如蟛蜞殼白見潮欲來出穴舉螯迎之故名倚望蟹有倚望常起顧睨東西其形兩翹八跂望常如此入穴乃止爾雅翼注倚望如蟛蜞青色進輒舉兩螯以望石蜠蜂江蘆虎蟹有石蜠蜂江蘆虎石殼鐵卵不中鼎爼好事取之充畫圗譜文登呂亢多識草木蟲魚守台州臨海命工作蟹圖凡十有二種一曰蝤蛑乃蟹之巨者兩螯大而有細毛如苔八足亦皆有微毛二曰撥棹子狀如蝤蛑螯足無毛後兩小足薄微濶其大如升南人皆呼為蟹八月間盛出人取之與人鬭螯甚巨往往能害人三曰擁劔狀似蟹而色黃其一螯偏長三寸餘有光四曰蟛螖螯微毛足無毛以鹽藏而貨于市爾雅蟛蠌音澤小者蟧蠌蟧吳人呼為彭􅒹搜神記言此物嘗通人夢自稱長卿臨海人多以長卿稱之五曰竭朴大于蟛螖殼黑斑有文章螯正赤常以大螯障日小螯取食六曰沙狗似蟛螖壤沙為穴見人則走屈折易道不可得七曰望潮殼白色居則背坎外向潮欲來皆出坎舉螯如望不失常期八曰倚望亦大如蟛螖居常東西顧睨行不四五又舉兩螯以足起望惟入穴乃止九曰石蜠大于常蟹八足殼皆赤狀如鵝卵十曰􅗶音流江如蟹兩螯足極小堅如石不可食十一曰蘆虎似蟛蜞正赤不可食十二曰蟛蜞大于螖小于常蟹此皆常所見者北人罕見故繪以為圖又海商言海中􅔢鼊島之東一島多蟹種類甚異有虎頭者有翅能飛者有能捕魚者有殼大兼尺者以非親見故不畫李履中得其一本為作記李時珍云生溪澗石穴中小而殼堅赤者石蟹也野人食之兩螯極小如石者􅗶江也不可食石蜠疑即千人揑按雜俎形似蟹大如錢殼甚固壯夫極力揑之不死俗呼千人揑不死因名漁書作千人擘殼堅肉滿無隙可乘當有子時一擘而開乘其瑕也􅗶江似蟹而小有十二腳爾雅翼蘆虎似蟛螖兩螯正赤不可食南海出車螯海物惟錯車螯蠣蚶眉目內缺獷殼外緘瓦礫何異庖厨是堪釋名蜃屬俗訛作昌娥李時珍云其殼色紫璀粲如玉斑點如花海人以火炙之則殼開取肉食之主治解酒毒消渴并癰腫南史何胤侈于味後欲去甚者門生鍾岏曰車螯蚶蠣眉目內闕慚渾沌之竒獷殼外緘非金人之愼不悴不榮曾草木之不若無聲無臭與瓦礫其何殊故宜長充庖厨永為口實或云蛤蜊大者蘇頌云肉似蛤蜊而堅硬不及梁元帝啓車螯味髙食部名陳物志蛤蜊聲重前論見珍若士見淮南子並東海波臣西王母藥雀文始化燕羽猶存體潤珠胎形隨月減漁書車螯亦蛤類大小不等大者如拳土名沙蟯小者如指土名沙白小之味甚于大其殼光滑如佳磁江賦注瓊蚌似車螯潔白如玉臨海水土記似車螯而角不正者曰移角似車螯而殼薄者曰姑勞似車螯而小者曰羊蹄出羅江昔人皆謂雉化者乃蛟類之蜃陳藏器羅願謂即蛟類之蜃似誤蠣房海曲蠣房或名蠔山眉渠磊砢牡牝異斑肉曰蠣黃醰味海蠻本經名蠣蛤别録名牡蛤異物志名賁或名蠔按房音傍讀如阿房之房張九嵕蠣贊蜂房水窩幾千萬落附石以生得潮而活所茹海藻所吞月魄貯白玉甌雲凝霧結沁甘露漿涎流溢咽是無上味形容不得陳藏器云天生萬物皆有牝牡惟蠣是鹹水結成塊然不動隂陽之道何從而生雜爼亦云李時珍謂蛤蚌之屬皆有胎生卵生獨此化生純雄無雌故得牡名本草云生東海池澤是百嵗雕一作蜩所化十一月采以大者佳其生著石皆以口在上舉以腹向南視之口斜向東則是左顧道家以左顧者是雄名牡蠣右顧者名牝蠣入藥用左顧者良蠣言其粗大也雨航雜録蠣生著石磈礧相連如房一名蠔山初生海島邊才如拳石四面漸長有一二丈者巉巗如山每房有蠔肉一塊大小如房廣缺蹄小房如人指面每潮來則諸房皆開缺含以充腹海人取之皆鑿房以烈火逼開取肉食之漁者于海淺處植竹扈竹入水纍纍生礪斫取之名曰竹蠣文選玄蠣磈磊而碨䃁注長七尺形如馬蹄又謂梅花蠣是物除熱補傷澀精益血土人用以為醬曰蠣黃醬樂清縣新溪口有蠣嶼方圓數十畝四面皆蠣其味偏好合澗有牡礪名蠔南人重之語曰得合澗一蠔亦足以豪韓文公詩蠔相粘為山十百各自生宋翟忠惠焦山詩僧居蠔山迷向背佛宇蜃氣成吹噓王敬美閩部疏蠣房雖介屬附石乃生得海潮而活凡海濵無石山溪無潮處皆不生余過莆迎仙寨橋時潮方落兒童群向石間剔取肉去殼連石不可動或留之仍能生蚶音憨子蚶為蚌屬文似瓦屋殼中有肉紫色滿腹縱橫其理五味具足盛𢎞之荆州記舊贊蚶子蚌屬形如瓦筒縱橫厥理五味具充又云千歲蝙蝠化為魁陸别名為蚶形如瓦屋又張九嵕頌內柔而茹外剛而錯惟柔乃食其肉惟剛幾磨其殼茹其肉棄其殼蚶乎蚶乎其贊食指之甘而扶糟丘之酣者乎嶺表録異蚶子蓋蛤蚌之類南人名空慈子頃盧均尚書移鎮嶺南改名瓦屋子以其殼上有稜如瓦壠子故名殼中有肉紫色而滿腹廣人尤重之多燒以薦酒俗呼天臠炙食多即壅氣背膊煩疼未測其性也貝夏玄周錦貨貝以市砑螺暈紙光我髦士厥有神功消霧寧水豈特把玩止娛童子鹽鐵論夏后氏以玄貝詩成是貝錦貝文如錦也張融集綺貝繡螺南方記斑貝螺大者圍之得六寸採賣之以易絳青相如傳釣紫貝注紫質黑文古以為貨南越王獻文帝紫貝百五左思賦紫貝流黃山海經邽山濛水出黃貝説文古者貨貝而寶龜用以交易以二為朋桂海虞衡志貝子海傍皆有之大者如拳上有紫斑小者指面大白如玉東方朔傳齒若編貝指小者耳徐衷南方記曰斑貝螺大者圍之得六寸小者圍之得五寸在于海邉漁人時有得之者大貝出諸薄巨延州土人採賣之以易綘青劉欣期之交州記曰大貝出日南如酒杯小貝貝齒也善治毒俱有紫色郭璞貝贊曰先民有作龜貝為貨貴以文采賈以小大簡則易資犯而不過蚌萬物變蛻其理無方雀雉之化含珠懷璫與月盈虧協氣晦望郭璞贊補墨子缺吳都賦蚌蛤珠胎與月虧全文心雕龍蚌病成珠淮南子明月之珠螺蚌之病而我之利也呂氏春秋月望則蚌蛤實羣隂盈月晦則蚌蛤虛羣隂缺淮南子月死而螺蚌膲鱉孚乳以夏蚌孚乳以秋又蚌聞雷聲則㾭又海中小蚌曰蟶蚌大者如箕徐充南方記珠蚌殼長三寸在漲海中亦名珠母殼武人多以之飾𢃄色如銀毋缺戰國䇿趙且伐燕蘇代為燕謂趙惠王曰川蚌方出曝而鷸啄其肉蚌合而相持鷸曰今日不雨明日不雨即有蚌脯蚌亦謂鷸曰今日不出明日不出必見死鷸螺贊缺古文通作蠡種類最多田螺生水田中形圓大如桃李殼有旋文狀類蝸牛外剛內柔青黃色其肉視月盈虧故王充云月毁于天螺消于淵淮南子蛤珧珠龜與月盛衰蓼螺紫色有斑文味辛如蓼字亦作蠡香螺厴可雜甲香者鈿螺光彩可飾鏡背紅螺色微紅珠螺瑩潔如珠梭尾螺形如梭今釋子所吹者不入藥又一種蝸螺一名螺螄小于田螺上有稜大如指頭而殼厚于田螺惟食泥水春月人采置鍋中蒸之其肉自出酒烹糟煮食之清明後其中有蟲不堪用矣此物難死誤泥入壁中數年猶活今寧波出泥螺狀如蠶豆可代充海錯蘇頌云流螺大如小拳青黃色長四五寸諸螺中此肉味最厚南人食之桂海虞衡志青螺狀如田螺其大兩拳揩磨去粗皮如翡翠色雕琢為酒杯其形有大如瓿者如升如碗如拳者如指頂者其色有斑文有黃白有蒼有黑其殼有吹作鼓角者有可以盛水盛花者有可為酒杯者其肉皆中食品名號不一吹者名響螺視夷螺為大盛水者名㼸螺以狀似㼸也杯勺者名孔螺身有刺孔即鸚鵡螺如拳者為香螺黃螺花螺小者為珠螺為青茵為海獅不可盡紀蜃蜃乃雉化氣成樓臺摩殼以耨始于姫邰農耨從辰文有自來月令雉入大水為蜃晉語雉入于淮為蜃説文雉雀虬皆化蜃古人多以作器皆注大蛤也缺雜兵書渭水出氣如蜃蜃形如蛇而大腰以下鱗盡逆食燕子一曰狀似螭龍有角有耳背鬛作紅色世云雉與蛇交而生蜃又云蛇求于雉則為蜃故三物常異而同感也按蜃有蛤蜃蛇蜃二種蠯蠯式玉度蚌象寶爻螺書璚籕篆蟲雕取類斯大稱名則稍何傷磊落無損賢豪蠯蚌之狹而長者見周禮一名馬刀别録云生缺池澤及東海取無時陶𢎞景云生江漢長六丈缺其肉似蚌陳藏器云一名齊蛤生海中狀如蛇缺尖小易離為蚌為螺螺之形鋭蚌之形剡皆缺內柔而性又善麗故也寶爻見京房易傳唐缺贊神禹岣嶁碑云龍畫傍分螺書匾刻徐楚食缺貴􅝻匾􅝻音果異魚圖贊箋卷四
