body:
  text: 異魚圖賛箋補引戊午之役觖望禹門自分泥蟠畢此生矣同社多挾䇿走長安而余復負笈入山寺章句瀋餘既所憎對覓話老衲外惟日披古函㪚帙以喻適志耳偶簡升菴先生異魚圖賛不避疎淺漫摭見聞詮次如卷已而老衲見之戯謂曰羡淵不如結網獲鮮可以忘筌余服膺其得斵輪㣲㫖異日持青脊墨頭十數魚名暨山海經所載珠蝥之類来訊則又升菴先生所遺者余因類搜其遺補之維時陽萌寒谷氣啓負氷聊借筆墨作濡呴緣以傲簡蟫曰余將彈鋏衡泌不欲似爾分飽神仙字也稿成命兒子軰較正魯魚乃亦彷箋如左凡三卷又閏集一萬厯戊午長至日蒲亭胡世安識
