body:
  text: 異魚圖贊箋卷三明楊慎原本大學士胡世安箋髮魚髮魚帶髮形如婦人出于滇池肥白無鱗魏武帝四時食制北户録曰髮魚戴髮形如婦人肥白無鱗出滇池述異記查道奉使髙麗見沙中一婦人紅裳雙袒髻鬟紛亂背後微有紅鬛查命人扶于水中遂拜手感戀而沒洽聞記海人魚東海有之大者長五六尺狀如人眉目口鼻手爪頭皆美麗女子無不具足皮肉白如玉無鱗有細毛五色輕軟長一二寸髮如馬尾長五六尺隂形與丈夫女子無異臨海鰥寡多取得飬於池沼交合之際與人無異亦不傷人稽神録謝仲玉見婦人出沒波中腰以下皆魚也海語人魚長四尺許體髮牝牡人也惟背後有短鬛微紅耳間出沙汭亦能媚人舶行遇者必作法禳惡其作􅑂故也昔人使髙麗偶泊一港適見婦人仰臥水際顱髮蓬短手足蠕動使者識之謂左右曰此人魚也慎母傷之令以楫扶至江中噀波而逝琵琶魚海魚無鱗形類琵琶一名樂魚其鳴孔嘉聞音出聽曽識匏巴沈懷遠南物志述異記海魚千嵗為劍魚一名琵琶魚形如琵琶而善鳴因以名焉雨航雜録綬魚一名華臍一名老婆其腹有帶如帔子生附其上形如科斗大者如盤或曰此文選所謂琵琶魚也無鱗冬初始出者俗重之至春則味降矣談乘淮南子匏巴鼓瑟淫魚出聽淫魚形似鬲身頭相半長丈餘鼻大玉白身黑口在頷下有鬐無鱗出于江中喜音出聼今訛作游魚此魚九江多有但不聞好音也說文引傳淫作鱏此贊未審何據含光魚含光之魚臨海郡育南人臠炙雖美而毒煎煿已乾耀夜如燭南物志按本草即鱣魚此魚甘平有小毒異物志名含光者言其脂肉夜有光也飲膳正要遼人名阿八兒忽魚李時珍云鱣狀似鱘其色灰白其背有骨甲三行其鼻長有鬚其口近頷下其尾岐其出也以三月逆水而上其居也在磯石湍流之間其食也張口接物聽其自入食而不飲嶺表録異黃臘魚即江湖之橫魚頭嘴長鱗皆金色臠為炙雖美而毒或煎煿乾夜即有光如籠燭北人有寓南海者市此魚食之棄其頭于糞筐中夜後或有光明近視之益恐懼以燭照之但魚頭耳去燭復明以為不祥各啓食奩窺其餘臠亦如螢光達明遍詢土人乃此魚之常也憂疑頓釋􅬻魚􅬻魚長咫大如竹竿爆之為燭光明有爛脊骨又美可作羮餐臨海水土志北户録引臨海异物志䱼魚如指長七八寸但有脊骨好作羮滑美似餅大者如竹曝作燭極有光明今按字書無􅬻的是䱼字之誤婢屣奴屩應附比目魚有婢屣亦有奴屩其名雙偶其形兩肖味皆堪噉出臨海嶠按即比目魚俗名鞋底魚臨海志名婢屣臨海風土記名奴屩南越志名版魚南方異物志名箬葉魚皆因形也石斑魚石斑媱蟲虎文形蚓蝘蝥為牡水邊呼引石斑即走上岸合牝其性既惡羮不可飲石斑魚延夀書名石礬魚異物志名髙魚李時珍云石斑生南方溪澗水石處長數寸白鱗黑斑浮游水靣聞人聲則劃然深入臨海水土記長者尺餘其斑如虎文而性淫春月與蛇醫交牝故其子有毒南方異物志髙魚似鱒有雌無雄二三月與蜥蝪合于水上其胎毒人雜爼僧行孺言建州有石斑魚好與蛇交南中多隔蜂窠大如壺常羣螫人土人取石斑魚就蜂樹側之標于竿上向日令魚影落其窠上須㬰有鳥大如燕數百互擊其窠窠碎落如葉蜂亦全盡墨客揮犀南方溪澗有魚生石上號石斑魚作鮓甚美至春含育則有毒不可食云與蜥蜴交也按陳藏器云石鮅魚生南方溪澗中長一寸背裏腹下赤南人以作鮓甚美據二說此魚非不中食者矣抑另種耶李日華篷窗夜話黃山澗中生斑魚如蝘蜓而無足善含水登木隱樹杪叢葉中仰口水汪汪然渴鳥過而飲之輒箝翕曵而入水恣其饞嚼小蟲設機陷物隱慘乃爾可畏哉未審即此魚否戴星魚戴星之魚背有星文㸃䵠玓瓅因之名云中都玳瑁魚雪質而黑章的礫若漆儼然玳瑁疑亦其類臨海水土記戴星魚狀如鳶魚背上有兩白璫如指大因名鯧魚鯧魚兩肋大肉堪臠蒸之粳米其骨亦軟號狗㗐睡謂無餘衍即鯧魚本草有鯧鯸昌鼠之稱昌美也以味名或云此魚游于水羣魚隨之食其涎沫有類于娼故名閩人訛作鯧廣人連骨煮食呼狗㗐睡魚四五月出陳藏器云鯧魚生南海狀如鯽身正圓無硬骨作炙食至美嶺表録異鯧形似鯿魚腦上突起連背身圓肉厚白如鱖只有一脊骨治之以薑葱蒸之以粳米甚軟食之無餘䱥魚䱥魚之味其美在額古諺有之價􅚢世宅鱣腮沙刺黃骨鯧脊南烹所珍百倍秦炙南越志䱥魚長五六寸味極肥腴土人重之故古諺云寧去纍世宅不去䱥魚額炙食甘美子可為醬食鱣魚之美在腮沙魚之美在刺南中八郡志黃魚形似鱣骨如葱可食郭義恭廣志云犍為都僰道縣出臑骨黃魚䱥一作鰶雨航雜録青鰶魚冬月肥美海錯之佳者或以敵松江之鱸張汝逺曰此邾莒之于齊魯豈其方鰥魚當附䲆後敝笱在梁其魚惟鰥其大盈車餌以豚豩鰥死以餌士死以貪孔叢子衛人釣于河得鰥其大盈車曰吾下一魴之餌鰥過而不視益以豚之半則吞矣子思曰噫鰥貪以餌死士貪以祿死一作鱞按惠志鱞魚大如指長八寸脊骨宜羮殆應鯧類鰥似鯇而大鬛紅何羅魚何羅之魚一身十首化而為鳥其名休舊竊糈于舂傷隕在臼夜飛曵音聞舂疾走山海經譙明山譙水出焉西注于河中多何羅之魚一身而十首其音如吠犬食之已癰亦可禦火或作河羅休舊按嶺表異録一名休鶹夜飛晝伏能拾人爪甲以為凶又名夜逰女好與嬰兒作祟又名鬼車又名魚鳥入人屋收魂氣其頭有九為犬所噬一首下血滴人家則凶故聞其聲則嗾犬使吠以厭之按衝波傳有鳥九尾孔子與子夏渡江見而異之人莫能名孔子曰鶬也嘗聞河上之歌云鶬兮鶬兮逆毛衰兮一身九尾長兮又江賦竒鶬九首裴瑜注爾雅言鶬糜鴰是九頭鳥也俗呼鬼車天隂時作聲聲如刀車鳴白澤圖謂之蒼鸆帝嚳書謂之蒼逆小說云周公居東惡聞此鳥命庭氏射之失其一首餘猶九首竊糈之說蜀有之至今聞此鳥聲夜舂徹里鰅魚周成王時揚州獻鰅其皮有文出樂浪東漢神爵初捕輸考工又名䲓鰅說文皮有文出樂浪東􅀈神爵四年初捕輸考工周成王時揚州獻鰅魚容切按周書王㑹其于魚曰揚州解隃寇鰅亦有隃音疑即此鮯魚東方有魚其形如鯉其名為鮯六足鳥尾鱐為之母胎育厥子山海經跂踵一作鼓鐘之山有水名曰深澤有魚焉其狀如鯉而六足鳥尾名曰鮯鮯古㳫切之魚其鳴自呼玉篇鱐音宿鮯母也䱡魵鱸􅵨鱳樂浪潘國魚之淵府異哉䱡魚魼有兩乳魵鱸􅵨鱳各以類聚漢獻大官叔重是取五魚皆出樂浪潘國見說文博雅鯆䱐䱡也即江豚别名天欲風則見雜爼䱡奔䱐也一名瀱非魚非蛟大如船長二三丈色如鮎有兩乳在腹下雄雌隂陽類人取其子著岸上聲如嬰兒啼頂上有通孔頭氣出嚇嚇作聲必大風行者以為候熬一頭得膏三四斛取之燃燈讀績輒暗行樂之處偏明魵音粉又蝦别名出東夷一名䲅觸物輒嗔腹脹如䱡又有䱡名浮于水上其出有時率以冬至後來鱳亦名􅀈鮞魚之美者東海之鮞伊尹說湯水羣首茲徒聞其名而形未窺國語鯤鮞注細魚也呂覽魚之美者洞庭之鱄東海之鮞改作鰣訓魚子當從兒又溷鯢矣鰸遼東􅀈水鰸狀如蝦無足長寸形如股義茲雖微蟲其味特佳說文鰸魚狀似蝦無足長寸大如義音叉股出遼東海篇作鮢桂海虞衡志蝦魚出灕水肉白而豐味似蝦而鬆美此豈鰸類耶烏鰂烏鰂八足集足在口縮喙在腹形類鞋囊其名烏鰂吸一作吸波噀墨迭射水慝萬震海物異名記趙德麟侯鯖録所載同但八足下有絶短者水慝下有以衛害焉埤雅每遇大魚輒噀墨周其波以衛身害若小蝦魚過其前即吐墨涎惹之李時珍云烏鰂無鱗有鬚黑皮白肉大者如蒲扇煠熟以薑醋食之脆美背骨厚三四分輕虛瑩白名海螵蛸形似摴蒱子而長兩頭尖脆如通草重重有紋以指甲可刮成末人亦鏤作鈿飾魚有烏賊狀如箕一作算囊骨間有鬐兩帶極長含水噀墨欲蓋反章南越志烏賊魚浮水面烏見之以為死啄之乃捲取去故云烏賊蘇頌云生東海形如算囊口在腹下八足聚生于口旁有兩須如帶甚長能吹波噀墨令水溷黑自衛以防人捕人反以是取之炙轂子此魚遇漁舟即吐墨染水令黑以混其身漁人見水黑網之大獲傳曰欲蓋而章圖存而亡此之謂也越志烏賊懷墨而知禮蓋腹中血及膽正如墨可以書字江東人或取其墨書契以紿人財物書跡如淡墨逾年自消惟空紙爾夢溪筆談宋明帝好食蜜漬鱁鮧一食數升按鱁鮧烏賊腸也澠水燕談雒陽園户相妬則以烏賊刺刺花樹枝皮中花心死盡牡丹忌此魚耳漁書烏賊有云秦皇渡海筆槖墜水化為此魚故形猶似之墨尚在腹也魚種大小不同名稱亦異有名花衫象其色也有名尖殼象其形也最小者名春桃則其子也烏則之魚􅖂鳥所變海若小史懷墨𢃄算須與其足皆在眼畔風波稍急粘石為纜章舉石距同狀異面食品所珍圖畫悉絢呂氏春秋注引古月令九月寒烏入水化為烏則故義訓云魚之入月令七十二候者惟烏則爾羅願云此魚有文墨可為法則故名掌禹錫云􅖂或作鵯鶋小鳥也亦名鵯鵊俗稱山呼圖經云背上骨厚三四分則非小鳥今據爾雅雒鳥􅖂是水鳥似鶂短頸腹翅紫白背上緑色名字既與圖經相符而背骨又類螵蛸則􅖂所化明矣雜俎一名河伯從事小史海人言秦皇東逰棄算袋于海化此魚形如算袋兩𢃄極長舊說烏則有矴遇風則虯前一須下矴一名纜魚風波稍急即以其須粘石為纜蓋此魚每遇大風遠岸則虯前一須為矴近岸則粘前一須為纜天台智顗禪師請禁海漈捕魚滬陳宣帝勑答曰此江既無烏則珍味宜依所請觀此烏則之味為食品之珍尚矣相感志烏則過小滿則形小山東登萊名八帶魚金州衛髙麗名八梢魚章舉石距烏則之别種見日華子章魚臨海志名音佶魚生南海如烏則而大八足身上有肉閩粵人多採鮮者薑醋食之味如水母韓退之所謂章舉馬甲柱鬭以怪自呈石距亦其類身小而足長入鹽燒食極美蘇頌云二物似烏則而大更珍好食品所重不入藥用雨航雜録海上鱗族異者名章巨大者名石拒居石穴人取之能以腳粘石拒人故名形如算袋八足長二三尺足上磈􅓓戢戢如釘每釘有竅浮海砂中如死物烏啄之即捲入水噓足釘啜之以飽其小者名章舉又名章魚别一種生海塗中名望潮身一二寸足倍之士人稱塗蟢又一種腳短而無釘者名瑣管寧台溫皆有之其名章巨蓋江東子弟所名項羽引江東卒與秦戰秦將章邯拒之卒為羽所降故江東名是物章拒人怯而負勇名者亦號章巨漁書云望潮里人呼為章魚生于海泥中潮至則出穴取食故以為號非鱗非介有身無骨腳有八而無其帶藏口于腹以首為腸中亦有墨大抵皆墨魚一派而異形耳其首似僧兩傍無耳腳中肉自成圈離離有章此章魚之所由名也亦有因腳磈磊怪異呼為癩魚凡有數種有名長腳姨名候水俱至秋冬而肥狀與章魚相類而章魚實别一種其最小者首圓如彈丸傍有兩耳大不盈寸名胡泥生于春最大者為石巨生岩中頭大如升腳長數尺重可十數斤海上人小豚遊于水濵多為負去諺云石巨捲豚反為豚所捲亦極言其大耳鰻鱺海鰻江鱺善攻岸崎又善升木水居畏之既愈人痾復裨牛肥驅蚊如掃兹功亦竒黃𠂻海語鰻鱺大者身徑如磨盤長丈六七尺鎗嘴鋸齒遇人輒鬭數十為隊恆隨盛潮陟山而草食所經之路漸如溝澗夜則鹹涎發光舶人以是知鰻鱺所集也燃灰厚布所開路執鏢㦸諸器羣謀而前鰻鱺循路而遁遇灰體澀不可竄移時乃困舶人恣殺之皮厚近寸食之美于肉也圖經云是蛟蜃之類善攻崎岸使輒頺陀近江河居人酷畏之歙州出一種背有五色文其功最勝出海中名海鰻與江鰻相類而大功用亦同又名慈鰻又名猧狗魚陶𢎞景云鰻鱺魚味甘形如鱔能緣樹食藤花作脯佳陳藏器云狗及牛瘦取一二枚短小者以竹􅀢從口及鼻生灌之立肥張鼎云燒烟熏蛟令化為水熏氊及屋舍竹木斷蛀蟲置骨于衣箱斷諸蠧埤雅似鱔而大有雄無雌以影漫鱧而生子趙辟公雜說云影漫于鱧則其子皆附鱧之鬐鬛而生故名一曰鮎亦産鰻蓋其乳子三分之一為鮎其一鰻也李時珍云狀如蛇背有肉鬛連尾無鱗有舌腹大者長數尺脂膏最多背有黃脉者名金線鰻鱺此魚善穿深穴汪石山云小者可食重四五斤及水行昻頭者不可食夷堅續志四目者殺人背有白㸃無腮者不可食稽神録有人病瘵相傳死者數人因取病者置棺中棄于江以絶害流至金山漁人引起開視乃一女子猶活取置漁舍每以鰻鱺飼之遂愈因以為妻紹興府龜山一井中有靈鰻時出見因名唐徐季海詩孤岫龜形在深泉鰻井開又鎮江北山有僧浚井得鰻魚二因名宋陸游詩鰻井初生一縷雲鮑郎山下雨昏昏櫓聲嘔軋秋空曉水際人家尚閉門又寧波阿育王山下聖井有一丈鰻旱禱有應奉化縣靈濟泉傳有九節鰻禱雨獲之輒應漁書鰻魚身有珠滑不可捉生深海中者為白鰻長五六尺重可數斤淺海為青鰻有刺而軟黃者為凃龍小者為油筯為粉鰻又一種骨硬刺浮于肉名強骨人不食之生山澗中能緣樹食草花者名鱺鰻味絶肥而甘美韓詩外傳南瑕子過程本本烹鱺魚以進曰此乃君子食也瑕子曰髙比者所以廣德也下比者所以狹行也吾豈自比君子哉志慕之而已青魚江有青魚其色正青泔以作鮓曰五侯鯖枕如琥珀可以籠燈亦為冠辨以飾麗婷青魚以色名也大者名䱾魚俗名烏鰡狀似鯢鯇而背正青色食螺蚌南人多以作鮓所謂五侯鯖是也臘月取膽隂乾用主治目昏魚魫即青魚枕骨也可為燈罩又作女冠大觀本草頭中枕蒸取乾代琥珀用之摩服主治心腹痛圖經云頭枕骨蒸令氣通曝乾狀如琥珀云可代琥珀非也荆楚取此枕煮拍作器甚佳六合縣南龍津橋下有鯖魚長數丈􅪓黃帛其􅪓石鼓攸鐫槎頭縮項味珍襄川詞林藻詠名播錦箋石鼓文黃帛其即魴也腹內有肪味最腴美性宜活水爾雅翼小頭縮項穹脊博腹扁身細鱗色青白今之鯿魚漢水産尤佳常以槎斷水用禁人捕謂之槎頭鯿宋張敬兒為刺史獻齊髙帝一千八百頭即此孟浩然詩魚藏縮項鯿又一種火燒鯿頭尾俱似魴而脊骨更隆上有赤鬛連尾如蝙蝠之翼黑質赤章色如烟熏故名其大有至二三十斤者竹頭䱢魚張楫廣雅檦竹頭䱢滇池所饒亦名竹丁烹以為䱓案酒薦馨竹頭者䱢之别名滇池在今雲南府城南一名昆明池又桂海虞衡志竹魚出桂林湘灕諸江中狀如青魚大而少骨刺色如竹色青翠可愛鱗下間有朱㸃味如鱖魚廣南珍品又杭富陽出篛魚形似蒻惟五月有之北户録金魚腦中有麩金狀如竹頭魚出卭婆塞江鮬魚鮬帷妾魚厥形如瓜亦名為鯧同彼狹邪淫蟲相邇其味苦嘉玉篇音枯又音區似鮒子而黑爾雅鱊鮬鱖鯞婢妾魚也崔豹古今注江東人呼青衣魚為婢􅀈是也一云鮬鯞小魚色黑揚赤今之旁皮鯽行以三為率一頭前兩頭從之若媵妾然按即本草䲙魚孟詵櫛化之說謬帷蚡鼠化䲙䲙化蚡鼠劉績霏雪録中紀之而李時珍云嘗見也一統志大荒山在博白縣南一百五十里山上池中有婢妾魚大如楯兩翼及臍下有三條似練帶四尺許搖動有婢妾形故名又婢魚名鱥音貴者大口細鱗身有斑㸃鯧魚身廣而頭鋭細鱗而軟骨出於海似非鮬類見鯧箋䱀魚䱀魚味爽可朝酲在晉虞郎獻于帝庭其方俱在食經可徴詳目録陶𢎞景云肉致能醒酒李時珍云無鱗魚也身尾俱似小鮎腹下黃背上青黃腮下有二橫骨兩䰅有胃羣游作聲如軋軋性最難死亦詳鱨箋沙魚沙魚二族胡沙白沙酷肖鮫魚其實稍差功入金匱名昉日華即鯊埤雅鯋性善沉常沙中行蘇頌云鮫有二種南人通謂之沙魚大而長喙如鋸者曰胡沙性善而肉美小而皮粗者曰白沙肉彊而有小毒爾雅名鮀魚郭璞名吹沙俗名沙溝魚又名沙鰛時珍云此非海中沙魚乃南方溪澗中小魚也居沙溝中吹沙而游咂沙而食鮀者肉多形圓陀陀然也鯊大者長四五寸其頭尾一般大頭狀似鱒體圓似鱓厚肉重唇細鱗黃白色有黑斑㸃文背有鬐刺甚硬其尾不岐小時即有子味頗美俗呼阿浪魚詩義疏吹沙似鯽而狹小常張口吹沙長三尺許背上有刺螫人一名重唇蘥鯋宜都出鑽沙魚大擬于指圓長于筯有黑㸃文此馬融賦所稱鯊廣志吹沙魚大于指行沙中然宜都鯋以四月五月出餘月無之蓋化為烏耳鑽沙乃俗名海語魚麗之鯋蓋閩廣江漢之常産海鯋虎頭鯋體黑文鱉足巨者二百餘斤常以春晦陟于海山之麓旬日而化虎蛟鯋似蛟而鼻長皮可飾劍湖鯋青色背上有沙鬐鬛泡去外皮有絲作膾瑩如銀絲雨航雜録鯊春正月輒出魚最先至者海上鯋甚多有白蒲鯊黃頭鯊白眼鯊白蕩鯊青頓鯊牛皮鯊斑鯊鹿文鯊狗鯊􅀈鯊燕尾鯊虎鯊犂頭鯊香鯊尉斗鯊丫髻鯊劒鯊刺鯊鋸鯊烏鯊雷鯊凡二十一種鱓魚土龍之屬荇莖苓根化而為鱓黃白異亹鱔鱔同抱朴子荇莖苓根土龍之屬化為鱓有黃白二種白鱓出交址陶𢎞景本草鱔魚味甘大溫無毒云芹根所變或云人髮所化作臛食之甚補生水岸泥窟中冬蟄夏出亦名蛇鮀鱓越謀吳所進有湘沅之鱓録異記郫縣侯生于漚麻池側得鱓魚大可尺圍烹而食之髮白復黑齒落更生自此輕健談乘楊震傳鸛銜三鱓假借鱣字按爾雅注鱣長二三丈大數斗鸛焉能銜之且鱣灰色無文章鱓則黃質黑文卿大夫服之象故都講卜三鱓為三公之兆耳漁書云一種蛇變者名蛇鱓有毒害人南人鬻鱓肆中以缸貯水畜數百頭夜以燈照之蛇化者項下有白㸃通身浮上即棄之或以蒜投缸中則羣鱓跳擲不已亦物性相制也蘆䱐音胞蘆䱐之魚産蘆陵南俗以為醬海氓所甘南越志鱸䱐生山曲之間穴地為窟泉源涌則此魚出今蘆陵以南至于南州有焉俗以為醬􅷀魚吳楚􅷀魚其文如罽薦以上春美而多刺亦作鯚是魚處處有之據多刺之說又非鱖類豈北地所稱黃花魚耶又合江一種􅺗子魚文如􅀈魚而美鱀音忌一作􅀈鱀一名鱁鋭喙大腹長齒羅生上下相覆音混于􅷀而不同物即海豚也爾雅鱀是鱁郭注錯屬體似鱏尾如䱡大腹喙小鋭而長齒羅生上下相銜鼻在額上能作聲少肉多骨胎生健啖細魚大者長丈餘江中多有之埤雅鱀魚亦有懷珠者廣州元志有􅀈鱘龍魚短頸魚之屬其尤大者鱀魚數年一至南海廟前至則必有疾疫或云名鱁鮧海鰌鰍同魚之最巨曰海鰌爾舟行逢之不知幾里七日逄頭九日逄尾産子仲春赤遍海水水經海鰌魚長數千里穴居海底入穴則海水潮上出穴則潮退出入有節故潮候有期𤣥中記東方之東大海舟行者一日逄魚頭七日逄魚尾遇魚産則百里水為血嶺表録海鰌魚海上之最偉者也小者亦千餘尺一海船過南海見有山阻海東濤險而急又見十餘山或出或沒初甚訝之篙工曰非島鰌魚背也果見雙目閃爍如電須鬛若簸米箕一云鬐鬛似揚朱旗日中忽雨霡霂舟子曰此鰌魚噴氣水散于空風勢吹來若雨耳宋紀趙鼎謫珠崕自雷州浮海而南顧見洪濤間紅旗靡靡相逐而下疑為海寇或外國兵革舟人搖手戒勿語惶遽入舟披髮持刀出篷背立割其舌出血滴水中令使臣閉目坐船內凡經兩時頃聞舟人呼曰更生更生乃言頃所見巨鰌也能吞舟即舟人平生未嘗覩海語海鰌長者亘百餘里牡蠣聚族其背曠嵗之積崇十許丈鰌負以游鰌背平水即牡蠣峍屼水靣如山矣舶猝遇之如當其首輒震以銃炮鰌驚徐徐而沒猶漩渦數里舶顛頓久之乃定人始有更生之賀蓋觀甚竒而災甚切也一統志福寧州寧德縣海鰌井在霍童山閩中記井有海鰌甚巨若弄水堰沒天即大雨或先霖潦弄水即晴鯨海有魚王是名為鯨噴沫雨注鼓浪雷驚目作明月精為彗星崔豹古今注鯨海魚也大者長千里小者數丈一生數萬子常以五六月就岸生子至七八月導引其子還大海中鼓浪成雷噴沫成雨水族驚畏一皆逃匿莫敢當者或曰穴處海底出穴則水溢謂之鯨潮互見續博物志述異志南海有明珠即鯨魚目瞳夜可以鑒謂之夜光廣州記死不見有眼睛而噴浪翳于雲日星經天魚一星在尾後河中此星明則海出大魚又淮南子鯨魚死而彗星出東都賦注海岸有獸名蒲牢聲如鐘而性畏鯨鯨躍輒鳴故鐘鈕鑄作蒲牢形斫橦作鯨形東海大魚鯨鯢之屬大則如山其次如屋將死岸上身長丈六膏流九頃骨充棟木明月之珠乃是其目魏武帝四時食制異物志鯨鯢長百丈大亦稱之雄曰鯨雌曰鯢或死于沙上得之者皆無目說者謂目化為明月珠曹毗賦骸喪成島嶼之墟目落為明月之珠寰宇記漁人嘗于南海嶼得鯨頭骨如數百斛團頂上一孔大于甕嗟海大魚蕩而失水螻蟻制之橫岸以死輜重君海不可以徙䇿士之談譬其有理說苑吞舟之魚蕩而失水制于螻蟻者離其居也國策靖郭君將城薛客多以諫君謂謁者無與客通齊人有請者曰臣請三言而已矣靖郭君因見之客趨而進曰海大魚因反走君曰更言之對曰君不聞大魚乎網不能止鈎不能牽蕩而失水則螻蟻得意焉今夫齊亦君之水也君長齊奚以薛為夫齊雖隆薛之城到于天猶之無益也君曰善乃輟城薛木華海賦魚則橫海之鯨突杌孤游戞巗㠂偃髙濤茹鱗甲吞龍舟吸波則洪漣踧蹜吹潦則百川倒流或乃蹭蹬窮波陸死鹽田巨鱗插雲鬐鬛刺天顱骨成嶽流膏為淵異魚圖贊箋卷三
